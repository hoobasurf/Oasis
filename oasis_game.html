<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DREAMY STAR</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; position: fixed; top: 0; left: 0; touch-action: none; }
#ui { position: fixed; top: 0; left: 0; width: 100%; z-index: 10; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; pointer-events: none; }
.chip { background: rgba(10,0,20,0.8); border-radius: 50px; padding: 7px 18px; font-size: 15px; font-weight: 900; color: #ff9edc; font-family: 'Fredoka One', cursive; border: 2px solid rgba(255,100,200,0.35); backdrop-filter: blur(8px); }
#title { font-family: 'Fredoka One', cursive; font-size: 20px; color: #fff; text-shadow: 0 0 18px #ff50a0; letter-spacing: 3px; }
#notif { position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%); font-family: 'Fredoka One', cursive; font-size: 28px; color: #ff9edc; pointer-events: none; opacity: 0; z-index: 60; text-align: center; text-shadow: 0 0 30px #ff50a0; white-space: nowrap; }
#hint { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,180,255,0.4); letter-spacing: 2px; pointer-events: none; font-family: sans-serif; }
#jpad { position: fixed; bottom: 28px; left: 16px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,100,200,0.08); border: 2px solid rgba(255,100,200,0.25); display: none; touch-action: none; z-index: 30; }
#jknob { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(255,200,240,0.9), rgba(220,80,160,0.85)); top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; border: 2px solid rgba(255,255,255,0.4); }
@media (pointer: coarse) { #jpad { display: block; } #hint { display: none; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="chip">⭐ <span id="sc">0</span></div>
  <div id="title">✨ DREAMY STAR</div>
  <div class="chip">💎 <span id="gems">0</span></div>
</div>
<div id="notif"></div>
<div id="hint">ZQSD / Flèches — se déplacer partout</div>
<div id="jpad"><div id="jknob"></div></div>

<script>
// ============================================================
//  DREAMY STAR — Open World, Kirby 64 style camera
//  Flat ground you can explore freely in all directions
//  Camera stays close behind the player, slightly above
//  No platforming, no voids — just exploration!
// ============================================================
var CV = document.getElementById('c');
var CX = CV.getContext('2d');
function resize(){ CV.width = innerWidth; CV.height = innerHeight; }
window.addEventListener('resize', resize); resize();

// ── PLAYER ────────────────────────────────────────────────────
var PL = {
  x: 0, z: 0,        // world position (flat ground, y=0)
  vx: 0, vz: 0,
  angle: 0,           // facing angle in radians
  wf: 0, wt: 0,       // walk frame
  score: 0, gems: 0
};
var SPEED = 0.12;
var TURN  = 0.07;

// ── CAMERA ────────────────────────────────────────────────────
// Stays behind player, close up, looking forward
var CAM = {
  x: 0, y: 4.5, z: -8,  // current position
  tx: 0, ty: 4.5, tz: -8 // target
};
var CAM_DIST = 7;   // distance behind player
var CAM_HEIGHT = 5; // height above ground
var CAM_FOV = 280;  // focal length

// ── PROJECTION ────────────────────────────────────────────────
function project(wx, wy, wz) {
  var dx = wx - CAM.x;
  var dy = wy - CAM.y;
  var dz = wz - CAM.z;

  // Rotate into camera space (camera looks along player's facing direction)
  var ca = Math.cos(-CAM.angle), sa = Math.sin(-CAM.angle);
  var cx2 = dx * ca - dz * sa;
  var cz2 = dx * sa + dz * ca;

  // Pitch down slightly
  var pitch = 0.38;
  var cp = Math.cos(pitch), sp = Math.sin(pitch);
  var cy2 = dy * cp - cz2 * sp;
  var cz3 = dy * sp + cz2 * cp;

  if (cz3 < 0.3) return null;

  var f = CAM_FOV / cz3;
  return {
    x: CV.width * 0.5 + cx2 * f,
    y: CV.height * 0.56 - cy2 * f,
    z: cz3,
    scale: f
  };
}

var CAM_angle = 0; // camera facing angle (lerps to player angle)

function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }

// ── WORLD OBJECTS ─────────────────────────────────────────────
// Trees, flowers, rocks, coins, gems scattered around
var TREES=[], FLOWERS=[], ROCKS=[], COINS=[], GEMS=[], DECOR=[];

function rand(a,b){ return a+(b-a)*Math.random(); }
function seedRand(seed){ return ((Math.sin(seed)*43758.5453)|0)/1000%1; }

function buildWorld(){
  // Trees — spread across a wide area
  for(var i=0;i<80;i++){
    var angle=Math.random()*Math.PI*2;
    var dist=rand(12,120);
    // Keep starting area clear
    if(dist<10) dist=rand(14,120);
    TREES.push({
      x:Math.cos(angle)*dist, z:Math.sin(angle)*dist,
      h:rand(2.5,5), r:rand(1,2.2),
      col:['#2a7010','#388018','#1e5808','#2e8818','#4aaa28','#309020'][Math.floor(Math.random()*6)],
      col2:['#3a9020','#4aaa28','#28680e','#50b830','#38a018'][Math.floor(Math.random()*5)],
      trunkCol:rand(0,1)>0.5?'#6a3a18':'#543010',
      seed:Math.random()*100
    });
  }
  // Flowers
  for(var i=0;i<200;i++){
    var a=Math.random()*Math.PI*2, d=rand(2,100);
    FLOWERS.push({
      x:Math.cos(a)*d, z:Math.sin(a)*d,
      col:['#ff5a90','#ffd830','#ff7030','#e060ff','#40d0ff','#ff9020','#ff4060'][Math.floor(Math.random()*7)],
      r:rand(0.25,0.55), seed:Math.random()*100
    });
  }
  // Rocks
  for(var i=0;i<40;i++){
    var a=Math.random()*Math.PI*2, d=rand(8,100);
    ROCKS.push({
      x:Math.cos(a)*d, z:Math.sin(a)*d,
      w:rand(0.6,2), h:rand(0.4,1.4),
      col:rand(0,1)>0.5?'#8898a8':'#a09080',
      seed:Math.random()*100
    });
  }
  // Coins scattered
  for(var i=0;i<60;i++){
    var a=Math.random()*Math.PI*2, d=rand(5,90);
    COINS.push({x:Math.cos(a)*d, z:Math.sin(a)*d, done:false, bob:Math.random()*6.28});
  }
  // Gems (rarer, further)
  for(var i=0;i<20;i++){
    var a=Math.random()*Math.PI*2, d=rand(20,100);
    GEMS.push({x:Math.cos(a)*d, z:Math.sin(a)*d, done:false, bob:Math.random()*6.28,
      col:['#d060f0','#60a8ff','#ff4090','#40e0a0','#ffe030'][Math.floor(Math.random()*5)]});
  }
  // Decorative mushrooms / bushes
  for(var i=0;i<50;i++){
    var a=Math.random()*Math.PI*2, d=rand(4,90);
    DECOR.push({
      x:Math.cos(a)*d, z:Math.sin(a)*d,
      type:Math.random()>0.5?'mushroom':'bush',
      col:Math.random()>0.5?'#ff4040':'#ff8820',
      r:rand(0.3,0.8), seed:Math.random()*100
    });
  }
}

// ── GROUND TILES ──────────────────────────────────────────────
// Draw a perspective ground plane with tiles
function drawGround(){
  var horizon = CV.height * 0.50;

  // Ground gradient
  var gg = CX.createLinearGradient(0, horizon, 0, CV.height);
  gg.addColorStop(0, '#72d840');
  gg.addColorStop(0.5, '#52aa20');
  gg.addColorStop(1, '#306010');
  CX.fillStyle = gg;
  CX.fillRect(0, horizon, CV.width, CV.height - horizon);

  // Draw ground tiles (checkerboard-ish, Kirby 64 style)
  // Project a grid of points
  var tileSize = 5; // world units per tile
  var range = 60;
  var px0 = Math.floor(PL.x / tileSize) * tileSize;
  var pz0 = Math.floor(PL.z / tileSize) * tileSize;

  for(var tz = pz0 - range; tz < pz0 + range; tz += tileSize){
    for(var tx = px0 - range; tx < px0 + range; tx += tileSize){
      var p00 = project(tx,          0, tz);
      var p10 = project(tx+tileSize, 0, tz);
      var p11 = project(tx+tileSize, 0, tz+tileSize);
      var p01 = project(tx,          0, tz+tileSize);
      if(!p00||!p10||!p11||!p01) continue;
      // Cull tiles off screen
      var minY=Math.min(p00.y,p10.y,p11.y,p01.y);
      var maxY=Math.max(p00.y,p10.y,p11.y,p01.y);
      var minX=Math.min(p00.x,p10.x,p11.x,p01.x);
      var maxX=Math.max(p00.x,p10.x,p11.x,p01.x);
      if(maxY<horizon||minY>CV.height+20||maxX<-10||minX>CV.width+10) continue;
      if(maxY-minY < 1) continue;

      // Alternating tile colours
      var txi = Math.floor(tx/tileSize), tzi = Math.floor(tz/tileSize);
      var even = (txi+tzi)%2===0;
      var dist = Math.sqrt((tx-PL.x)*(tx-PL.x)+(tz-PL.z)*(tz-PL.z));
      var fade = clamp(1-dist/55,0,1);

      CX.globalAlpha = 0.18 * fade;
      CX.fillStyle = even ? '#a0ff60' : '#60c820';
      CX.beginPath();
      CX.moveTo(p00.x,p00.y); CX.lineTo(p10.x,p10.y);
      CX.lineTo(p11.x,p11.y); CX.lineTo(p01.x,p01.y);
      CX.closePath(); CX.fill();

      // Grid lines
      CX.globalAlpha = 0.07 * fade;
      CX.strokeStyle='#000';CX.lineWidth=0.8;
      CX.beginPath();
      CX.moveTo(p00.x,p00.y); CX.lineTo(p10.x,p10.y);
      CX.lineTo(p11.x,p11.y); CX.lineTo(p01.x,p01.y);
      CX.closePath(); CX.stroke();
    }
  }
  CX.globalAlpha = 1;
}

// ── DRAW TREE ─────────────────────────────────────────────────
function drawTree(t, tick){
  var sp = project(t.x, 0, t.z);
  if(!sp) return;
  if(sp.x < -200 || sp.x > CV.width+200) return;
  if(sp.z < 1) return;

  var scale = sp.scale;
  var trunkW = clamp(t.r * 0.35 * scale, 2, 24);
  var trunkH = clamp(t.h * 0.45 * scale, 6, 80);
  var leafR  = clamp(t.r * scale, 5, 90);

  // Shadow
  CX.globalAlpha = clamp(0.18 * scale, 0.05, 0.3);
  CX.fillStyle = 'rgba(0,0,0,0.5)';
  CX.beginPath(); CX.ellipse(sp.x+2, sp.y+2, leafR*0.9, leafR*0.22, 0, 0, Math.PI*2); CX.fill();
  CX.globalAlpha = 1;

  // Trunk
  CX.fillStyle = t.trunkCol;
  CX.fillRect(sp.x - trunkW*0.5, sp.y - trunkH, trunkW, trunkH);

  var topY = sp.y - trunkH;

  // Layered foliage (3 circles, like Kirby 64)
  CX.fillStyle = shadeCol(t.col, 0.7);
  CX.beginPath(); CX.arc(sp.x+leafR*0.12, topY+leafR*0.1, leafR, 0, Math.PI*2); CX.fill();

  CX.fillStyle = t.col;
  CX.beginPath(); CX.arc(sp.x-leafR*0.05, topY-leafR*0.08, leafR*0.88, 0, Math.PI*2); CX.fill();

  CX.fillStyle = t.col2;
  CX.beginPath(); CX.arc(sp.x-leafR*0.25, topY-leafR*0.3, leafR*0.6, 0, Math.PI*2); CX.fill();

  // Highlight
  CX.globalAlpha = 0.3;
  CX.fillStyle = 'rgba(255,255,220,0.7)';
  CX.beginPath(); CX.ellipse(sp.x-leafR*0.3, topY-leafR*0.35, leafR*0.22, leafR*0.14, -0.4, 0, Math.PI*2); CX.fill();
  CX.globalAlpha = 1;
}

// ── DRAW FLOWER ───────────────────────────────────────────────
function drawFlower(f, tick){
  var sp = project(f.x, 0, f.z);
  if(!sp) return;
  var r = clamp(f.r * sp.scale, 2, 16);
  if(r < 2) return;
  // stem
  CX.strokeStyle = '#2a6008'; CX.lineWidth = clamp(r*0.18,1,3);
  CX.beginPath(); CX.moveTo(sp.x, sp.y); CX.lineTo(sp.x + Math.sin(f.seed)*r*0.3, sp.y - r*1.6); CX.stroke();
  // petals
  var px2 = sp.x + Math.sin(f.seed)*r*0.3;
  var py2 = sp.y - r*1.6;
  CX.fillStyle = f.col;
  for(var j=0;j<5;j++){
    var a = j*Math.PI*2/5 + tick*0.02;
    CX.beginPath(); CX.ellipse(px2+Math.cos(a)*r*0.7, py2+Math.sin(a)*r*0.4, r*0.38, r*0.24, a, 0, Math.PI*2); CX.fill();
  }
  CX.fillStyle = '#ffe030';
  CX.beginPath(); CX.arc(px2, py2, r*0.3, 0, Math.PI*2); CX.fill();
}

// ── DRAW ROCK ─────────────────────────────────────────────────
function drawRock(r, tick){
  var sp = project(r.x, 0, r.z);
  if(!sp) return;
  var w = clamp(r.w * sp.scale, 4, 60);
  var h = clamp(r.h * sp.scale, 3, 45);
  if(w < 3) return;
  // shadow
  CX.globalAlpha=0.18;CX.fillStyle='rgba(0,0,0,0.5)';CX.beginPath();CX.ellipse(sp.x+2,sp.y+2,w*0.8,h*0.2,0,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
  // rock body
  CX.fillStyle = shadeCol(r.col, 0.7);
  CX.beginPath(); CX.ellipse(sp.x+w*0.08, sp.y+h*0.08, w, h*0.8, 0.1, 0, Math.PI*2); CX.fill();
  CX.fillStyle = r.col;
  CX.beginPath(); CX.ellipse(sp.x-w*0.04, sp.y-h*0.06, w*0.9, h*0.75, 0.1, 0, Math.PI*2); CX.fill();
  CX.globalAlpha=0.3;CX.fillStyle='rgba(255,255,255,0.6)';CX.beginPath();CX.ellipse(sp.x-w*0.28,sp.y-h*0.3,w*0.22,h*0.14,-0.3,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
}

// ── DRAW DECOR ────────────────────────────────────────────────
function drawDecor(d, tick){
  var sp = project(d.x, 0, d.z);
  if(!sp) return;
  var r = clamp(d.r * sp.scale, 2, 30);
  if(r < 2) return;
  if(d.type==='mushroom'){
    // stem
    CX.fillStyle='#e8d0b0';CX.fillRect(sp.x-r*0.22,sp.y-r*0.9,r*0.44,r*0.9);
    // cap
    CX.fillStyle=d.col;CX.beginPath();CX.ellipse(sp.x,sp.y-r*0.9,r*0.85,r*0.6,0,Math.PI,Math.PI*2);CX.fill();
    CX.fillStyle=shadeCol(d.col,0.7);CX.beginPath();CX.ellipse(sp.x,sp.y-r*0.9,r*0.85,r*0.6,0,Math.PI,Math.PI*2);CX.stroke && 0;
    // spots
    CX.fillStyle='#fff';CX.globalAlpha=0.7;
    CX.beginPath();CX.arc(sp.x-r*0.3,sp.y-r*1.2,r*0.16,0,Math.PI*2);CX.fill();
    CX.beginPath();CX.arc(sp.x+r*0.3,sp.y-r*1.1,r*0.12,0,Math.PI*2);CX.fill();
    CX.globalAlpha=1;
  } else {
    // bush
    CX.fillStyle=shadeCol('#3a8018',0.75);CX.beginPath();CX.arc(sp.x+r*0.15,sp.y-r*0.3,r,0,Math.PI*2);CX.fill();
    CX.fillStyle='#4aaa20';CX.beginPath();CX.arc(sp.x-r*0.08,sp.y-r*0.45,r*0.82,0,Math.PI*2);CX.fill();
    CX.fillStyle='#60cc30';CX.beginPath();CX.arc(sp.x-r*0.25,sp.y-r*0.65,r*0.55,0,Math.PI*2);CX.fill();
  }
}

// ── DRAW COLLECTIBLE ──────────────────────────────────────────
var PARTS=[], FLOATS=[];
function drawCoin(c, tick){
  if(c.done) return;
  var bob = Math.sin(c.bob+tick*0.08)*0.15;
  var sp = project(c.x, 0.5+bob, c.z);
  if(!sp) return;
  var r = clamp(sp.scale*0.18, 4, 16);
  if(r<3) return;
  // shadow
  var sg=project(c.x,0.02,c.z);if(sg){CX.globalAlpha=0.18;CX.fillStyle='rgba(0,0,0,0.5)';CX.beginPath();CX.ellipse(sg.x,sg.y,r*0.9,r*0.2,0,0,Math.PI*2);CX.fill();CX.globalAlpha=1;}
  CX.fillStyle='#ffe030';CX.beginPath();CX.arc(sp.x,sp.y,r,0,Math.PI*2);CX.fill();
  CX.fillStyle='#ffa010';CX.beginPath();CX.arc(sp.x+r*0.15,sp.y+r*0.1,r*0.7,0,Math.PI*2);CX.fill();
  CX.globalAlpha=0.5;CX.fillStyle='#fff';CX.beginPath();CX.ellipse(sp.x-r*0.28,sp.y-r*0.28,r*0.2,r*0.12,-0.4,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
  // collect
  if(Math.hypot(PL.x-c.x,PL.z-c.z)<1.5){c.done=true;PL.score++;document.getElementById('sc').textContent=PL.score;spawnPart(sp.x,sp.y,'#ffe030',8);addFloat(sp.x,sp.y-10,'🪙 +1','#ffe44d');}
}
function drawGem(g, tick){
  if(g.done) return;
  var bob = Math.sin(g.bob+tick*0.07)*0.2;
  var sp = project(g.x, 0.7+bob, g.z);
  if(!sp) return;
  var r = clamp(sp.scale*0.22, 5, 18);
  if(r<3) return;
  var sg=project(g.x,0.02,g.z);if(sg){CX.globalAlpha=0.18;CX.fillStyle='rgba(0,0,0,0.5)';CX.beginPath();CX.ellipse(sg.x,sg.y,r*0.85,r*0.18,0,0,Math.PI*2);CX.fill();CX.globalAlpha=1;}
  CX.fillStyle=g.col;CX.beginPath();CX.moveTo(sp.x,sp.y-r);CX.lineTo(sp.x+r*0.7,sp.y-r*0.2);CX.lineTo(sp.x+r*0.5,sp.y+r);CX.lineTo(sp.x-r*0.5,sp.y+r);CX.lineTo(sp.x-r*0.7,sp.y-r*0.2);CX.closePath();CX.fill();
  CX.fillStyle='rgba(0,0,0,0.25)';CX.beginPath();CX.moveTo(sp.x+r*0.7,sp.y-r*0.2);CX.lineTo(sp.x+r*0.5,sp.y+r);CX.lineTo(sp.x-r*0.5,sp.y+r);CX.lineTo(sp.x,sp.y);CX.closePath();CX.fill();
  CX.globalAlpha=0.45;CX.fillStyle='rgba(255,255,255,0.8)';CX.beginPath();CX.ellipse(sp.x-r*0.28,sp.y-r*0.3,r*0.2,r*0.12,-0.4,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
  if(Math.hypot(PL.x-g.x,PL.z-g.z)<1.8){g.done=true;PL.gems++;document.getElementById('gems').textContent=PL.gems;spawnPart(sp.x,sp.y,g.col,12);addFloat(sp.x,sp.y-10,'💎 +1',g.col);}
}

// ── DRAW PLAYER ────────────────────────────────────────────────
function drawPlayer(tick){
  // Project player position (at ground level y=0, standing up)
  var sp = project(PL.x, 0, PL.z);
  if(!sp) return;

  // r based on projection scale — but keep it big enough to see!
  var r = clamp(sp.scale * 0.55, 22, 40);

  var sqX = 1, sqY = 1;
  var moving = Math.abs(PL.vx)+Math.abs(PL.vz)>0.01;
  if(moving){ sqX=1.05; sqY=0.97; }

  // Ground shadow
  var gsp = project(PL.x, 0.02, PL.z);
  if(gsp){
    CX.globalAlpha=0.3;CX.fillStyle='rgba(0,0,10,0.7)';
    CX.beginPath();CX.ellipse(gsp.x+1,gsp.y+1,r*1.2,r*0.22,0,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
  }

  CX.save();CX.translate(sp.x, sp.y);CX.scale(sqX, sqY);

  // Body shadow
  CX.fillStyle='rgba(128,16,64,0.32)';CX.beginPath();CX.arc(2,3,r,0,Math.PI*2);CX.fill();
  // Body dark base
  CX.fillStyle='#c03070';CX.beginPath();CX.arc(0,0,r,0,Math.PI*2);CX.fill();
  // Body main
  CX.fillStyle='#ff6ea8';CX.beginPath();CX.arc(-1,-2,r*0.92,0,Math.PI*2);CX.fill();
  // Radial highlight
  var hl=CX.createRadialGradient(-r*0.3,-r*0.38,0,-r*0.1,-r*0.1,r*0.85);
  hl.addColorStop(0,'#ffcce2');hl.addColorStop(0.45,'#ff9ebc');hl.addColorStop(1,'rgba(255,100,150,0)');
  CX.fillStyle=hl;CX.beginPath();CX.arc(0,0,r,0,Math.PI*2);CX.fill();
  // Specular highlight
  CX.globalAlpha=0.5;CX.fillStyle='rgba(255,255,255,0.85)';CX.beginPath();CX.ellipse(-r*0.3,-r*0.36,r*0.27,r*0.16,-0.5,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
  // Cheeks
  CX.globalAlpha=0.28;CX.fillStyle='#ff3070';
  CX.beginPath();CX.ellipse(-r*0.52,r*0.24,r*0.3,r*0.17,0.2,0,Math.PI*2);CX.fill();
  CX.beginPath();CX.ellipse(r*0.52,r*0.24,r*0.3,r*0.17,-0.2,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
  // Eyes
  CX.fillStyle='#fff';
  CX.beginPath();CX.ellipse(-r*0.28,-r*0.1,r*0.3,r*0.36,0,0,Math.PI*2);CX.fill();
  CX.beginPath();CX.ellipse(r*0.28,-r*0.1,r*0.3,r*0.36,0,0,Math.PI*2);CX.fill();
  CX.fillStyle='#1a237e';CX.beginPath();CX.arc(-r*0.22,-r*0.08,r*0.2,0,Math.PI*2);CX.fill();CX.beginPath();CX.arc(r*0.34,-r*0.08,r*0.2,0,Math.PI*2);CX.fill();
  CX.fillStyle='#3f51b5';CX.beginPath();CX.arc(-r*0.2,-r*0.12,r*0.13,0,Math.PI*2);CX.fill();CX.beginPath();CX.arc(r*0.36,-r*0.12,r*0.13,0,Math.PI*2);CX.fill();
  CX.fillStyle='#fff';CX.beginPath();CX.arc(-r*0.12,-r*0.2,r*0.055,0,Math.PI*2);CX.fill();CX.beginPath();CX.arc(r*0.44,-r*0.2,r*0.055,0,Math.PI*2);CX.fill();
  // Mouth
  CX.strokeStyle='#a01848';CX.lineWidth=r*0.1;CX.lineCap='round';
  if(moving){CX.beginPath();CX.arc(0,r*0.38,r*0.32,0.15,Math.PI-0.15);CX.stroke();}
  else{CX.beginPath();CX.arc(0,r*0.42,r*0.22,0.28,Math.PI-0.28);CX.stroke();}
  CX.lineCap='butt';
  // Arms — walk animation
  var as = moving ? Math.sin(PL.wf*0.8)*0.55 : 0.1;
  CX.fillStyle='#ff9ebc';
  CX.beginPath();CX.ellipse(-r*0.9,r*0.04,r*0.27,r*0.17,0.9+as,0,Math.PI*2);CX.fill();
  CX.beginPath();CX.ellipse(r*0.9,r*0.04,r*0.27,r*0.17,-0.9-as,0,Math.PI*2);CX.fill();
  // Feet
  CX.fillStyle='#c03070';
  var fo = moving ? Math.sin(PL.wf*0.8)*r*0.1 : 0;
  CX.beginPath();CX.ellipse(-r*0.34,r*0.8+fo,r*0.3,r*0.17,0.2,0,Math.PI*2);CX.fill();
  CX.beginPath();CX.ellipse(r*0.34,r*0.8-fo,r*0.3,r*0.17,-0.2,0,Math.PI*2);CX.fill();
  CX.globalAlpha=0.25;CX.fillStyle='#ff6080';
  CX.beginPath();CX.ellipse(-r*0.34,r*0.78+fo,r*0.18,r*0.09,0.2,0,Math.PI*2);CX.fill();
  CX.beginPath();CX.ellipse(r*0.34,r*0.78-fo,r*0.18,r*0.09,-0.2,0,Math.PI*2);CX.fill();CX.globalAlpha=1;

  CX.restore();
}

// ── SKY ────────────────────────────────────────────────────────
var BGSTARS=[];
for(var i=0;i<55;i++) BGSTARS.push({x:Math.random(),y:Math.random()*0.85,r:Math.random()*1.3+0.3,s:Math.random()});
var CLOUDS=[];
for(var i=0;i<6;i++) CLOUDS.push({x:Math.random()*0.9,y:Math.random()*0.3+0.05,r:rand(20,55),spd:rand(0.015,0.035)});

function drawSky(tick){
  var horizon = CV.height * 0.50;

  // Sky gradient — warm golden, Kirby 64 prairie
  var sg = CX.createLinearGradient(0,0,0,horizon);
  sg.addColorStop(0,'#ffe090');
  sg.addColorStop(0.5,'#ffb040');
  sg.addColorStop(1,'#ff8020');
  CX.fillStyle=sg;CX.fillRect(0,0,CV.width,horizon);

  // Clouds
  for(var i=0;i<CLOUDS.length;i++){
    var cl=CLOUDS[i];
    cl.x = (cl.x + cl.spd*0.0002)%1;
    var cx2=cl.x*CV.width, cy2=cl.y*horizon, cr=cl.r;
    CX.globalAlpha=0.55;CX.fillStyle='#fff';
    CX.beginPath();CX.arc(cx2,cy2,cr,0,Math.PI*2);CX.fill();
    CX.beginPath();CX.arc(cx2-cr*0.55,cy2+cr*0.22,cr*0.72,0,Math.PI*2);CX.fill();
    CX.beginPath();CX.arc(cx2+cr*0.55,cy2+cr*0.18,cr*0.68,0,Math.PI*2);CX.fill();
    CX.globalAlpha=1;
  }

  // Sun
  var sx=CV.width*0.82, sy=CV.height*0.1;
  CX.fillStyle='#ffee50';CX.beginPath();CX.arc(sx,sy,30,0,Math.PI*2);CX.fill();
  CX.globalAlpha=0.35;CX.fillStyle='rgba(255,255,255,0.8)';CX.beginPath();CX.ellipse(sx-8,sy-8,10,6,-0.5,0,Math.PI*2);CX.fill();CX.globalAlpha=1;

  // Horizon haze
  var haze=CX.createLinearGradient(0,horizon-12,0,horizon+25);
  haze.addColorStop(0,'rgba(255,200,100,0.45)');haze.addColorStop(1,'rgba(255,200,100,0)');
  CX.fillStyle=haze;CX.fillRect(0,horizon-12,CV.width,37);

  // Far hills at horizon
  CX.globalAlpha=0.38;CX.fillStyle='rgba(55,130,20,0.6)';
  CX.beginPath();CX.moveTo(0,horizon+4);
  for(var x=0;x<=CV.width+60;x+=60){
    var hx=(x+PL.x*4)%800;
    var mh=horizon*(0.04+Math.abs(Math.sin(hx*0.014+0.6))*0.06+Math.abs(Math.sin(hx*0.008))*0.04);
    CX.lineTo(x,horizon+4-mh);
  }
  CX.lineTo(CV.width,horizon+4);CX.closePath();CX.fill();
  CX.globalAlpha=1;
}

// ── PARTICLES & FLOATS ────────────────────────────────────────
function spawnPart(sx,sy,col,n){for(var i=0;i<n;i++){var a=(Math.PI*2/n)*i+Math.random()*0.4,spd=2+Math.random()*3;PARTS.push({sx,sy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.5,col,life:45+Math.random()*18,max:63,r:2+Math.random()*2.5});}}
function addFloat(sx,sy,txt,col){FLOATS.push({sx,sy,txt,col,life:65,vy:-1.0});}
function drawFX(){
  for(var i=PARTS.length-1;i>=0;i--){var p=PARTS[i];p.sx+=p.vx;p.sy+=p.vy;p.vx*=0.88;p.vy=p.vy*0.88+0.1;p.life--;if(p.life<=0){PARTS.splice(i,1);continue;}CX.globalAlpha=p.life/p.max;CX.fillStyle=p.col;CX.beginPath();CX.arc(p.sx,p.sy,p.r,0,Math.PI*2);CX.fill();}
  CX.globalAlpha=1;CX.font='bold 15px Fredoka One,sans-serif';CX.textAlign='center';
  for(var i=FLOATS.length-1;i>=0;i--){var f=FLOATS[i];f.sy+=f.vy;f.life--;if(f.life<=0){FLOATS.splice(i,1);continue;}CX.globalAlpha=Math.min(1,f.life/20);CX.fillStyle=f.col;CX.fillText(f.txt,f.sx,f.sy);}
  CX.globalAlpha=1;CX.textAlign='left';
}

// ── HELPERS ────────────────────────────────────────────────────
function shadeCol(hex,f){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgb('+clamp(Math.round(r*f),0,255)+','+clamp(Math.round(g*f),0,255)+','+clamp(Math.round(b*f),0,255)+')';
}

// ── INPUT ──────────────────────────────────────────────────────
var KEYS={}, joyDX=0,joyDY=0,joyOn=false;
document.addEventListener('keydown',function(e){KEYS[e.code]=true;e.preventDefault&&['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>=0&&e.preventDefault();});
document.addEventListener('keyup',function(e){KEYS[e.code]=false;});
var jpad=document.getElementById('jpad'),jknob=document.getElementById('jknob');
var jSX=0,jSY=0,JR=50;
jpad.addEventListener('touchstart',function(e){e.preventDefault();joyOn=true;var rc=jpad.getBoundingClientRect();jSX=rc.left+rc.width/2;jSY=rc.top+rc.height/2;},{passive:false});
jpad.addEventListener('touchmove',function(e){e.preventDefault();if(!joyOn)return;var t=e.touches[0];joyDX=t.clientX-jSX;joyDY=t.clientY-jSY;var m=Math.sqrt(joyDX*joyDX+joyDY*joyDY),cl=Math.min(m,JR),a=Math.atan2(joyDY,joyDX);jknob.style.transform='translate(calc(-50% + '+Math.cos(a)*cl+'px),calc(-50% + '+Math.sin(a)*cl+'px))';},{passive:false});
jpad.addEventListener('touchend',function(e){e.preventDefault();joyOn=false;joyDX=0;joyDY=0;jknob.style.transform='translate(-50%,-50%)';},{passive:false});

// ── STEP PLAYER ────────────────────────────────────────────────
function stepPlayer(){
  var moveX=0, moveZ=0;

  // WASD / Arrows — move relative to camera facing
  if(KEYS['ArrowUp']   ||KEYS['KeyW']||KEYS['KeyZ']) moveZ += 1;
  if(KEYS['ArrowDown'] ||KEYS['KeyS']) moveZ -= 1;
  if(KEYS['ArrowRight']||KEYS['KeyD']) moveX += 1;
  if(KEYS['ArrowLeft'] ||KEYS['KeyA']||KEYS['KeyQ']) moveX -= 1;

  // Joystick
  if(joyOn){
    var jm=Math.sqrt(joyDX*joyDX+joyDY*joyDY);
    if(jm>8){ moveX+=joyDX/jm; moveZ-=joyDY/jm; }
  }

  var moving = Math.abs(moveX)+Math.abs(moveZ)>0.05;

  if(moving){
    // Compute world direction from camera angle
    var ca=Math.cos(CAM.angle), sa=Math.sin(CAM.angle);
    var wx2 = moveX*ca + moveZ*sa;
    var wz2 = -moveX*sa + moveZ*ca;
    var len=Math.sqrt(wx2*wx2+wz2*wz2);
    if(len>0){ wx2/=len; wz2/=len; }
    PL.vx += wx2*SPEED*0.4;
    PL.vz += wz2*SPEED*0.4;
    // Update facing angle
    PL.angle = Math.atan2(wx2, wz2);
    PL.wt++; if(PL.wt%5===0) PL.wf++;
  } else {
    PL.wt=0;
  }

  // Friction
  PL.vx *= 0.72;
  PL.vz *= 0.72;

  PL.x += PL.vx;
  PL.z += PL.vz;

  // Camera: stay behind player, follow facing direction
  // Camera angle lerps to player angle
  // Smooth camera angle
  var angleDiff = PL.angle - CAM.angle;
  while(angleDiff > Math.PI) angleDiff -= Math.PI*2;
  while(angleDiff < -Math.PI) angleDiff += Math.PI*2;
  CAM.angle = CAM.angle + angleDiff * (moving ? 0.06 : 0.02);

  var behindX = PL.x - Math.sin(CAM.angle)*CAM_DIST;
  var behindZ = PL.z - Math.cos(CAM.angle)*CAM_DIST;

  CAM.x = lerp(CAM.x, behindX, 0.1);
  CAM.y = lerp(CAM.y, CAM_HEIGHT, 0.05);
  CAM.z = lerp(CAM.z, behindZ, 0.1);
}

// ── NOTIFICATION ───────────────────────────────────────────────
var notifT=0;
function showNotif(txt,col){var el=document.getElementById('notif');el.textContent=txt;el.style.color=col||'#ff9edc';el.style.opacity='1';notifT=160;}

// ── MAIN LOOP ──────────────────────────────────────────────────
var tick=0;
function loop(){
  tick++;
  CX.globalAlpha=1;CX.globalCompositeOperation='source-over';CX.textAlign='left';CX.lineCap='butt';
  CX.clearRect(0,0,CV.width,CV.height);

  drawSky(tick);
  drawGround();

  // Gather all scene objects and sort by distance from camera (far first)
  var objs=[];
  for(var i=0;i<TREES.length;i++)   objs.push({type:'tree',obj:TREES[i],  dist:Math.hypot(TREES[i].x-PL.x,   TREES[i].z-PL.z)});
  for(var i=0;i<ROCKS.length;i++)   objs.push({type:'rock',obj:ROCKS[i],  dist:Math.hypot(ROCKS[i].x-PL.x,   ROCKS[i].z-PL.z)});
  for(var i=0;i<DECOR.length;i++)   objs.push({type:'decor',obj:DECOR[i], dist:Math.hypot(DECOR[i].x-PL.x,   DECOR[i].z-PL.z)});
  for(var i=0;i<FLOWERS.length;i++) objs.push({type:'flower',obj:FLOWERS[i],dist:Math.hypot(FLOWERS[i].x-PL.x,FLOWERS[i].z-PL.z)});
  for(var i=0;i<COINS.length;i++)   if(!COINS[i].done) objs.push({type:'coin',obj:COINS[i],dist:Math.hypot(COINS[i].x-PL.x,COINS[i].z-PL.z)});
  for(var i=0;i<GEMS.length;i++)    if(!GEMS[i].done)  objs.push({type:'gem',obj:GEMS[i], dist:Math.hypot(GEMS[i].x-PL.x, GEMS[i].z-PL.z)});

  // Only draw objects within view range
  objs = objs.filter(function(o){ return o.dist < 80; });
  // Sort far to near
  objs.sort(function(a,b){ return b.dist-a.dist; });

  // Player depth
  var playerDist = 0; // player is always at center

  // Draw objects far→near, insert player at correct depth
  var playerDrawn=false;
  for(var i=0;i<objs.length;i++){
    var o=objs[i];
    // Draw player when we reach objects closer than camera distance
    if(!playerDrawn && o.dist < 2){
      drawPlayer(tick); playerDrawn=true;
    }
    if(o.type==='tree')   drawTree(o.obj,tick);
    else if(o.type==='rock')   drawRock(o.obj,tick);
    else if(o.type==='decor')  drawDecor(o.obj,tick);
    else if(o.type==='flower') drawFlower(o.obj,tick);
    else if(o.type==='coin')   drawCoin(o.obj,tick);
    else if(o.type==='gem')    drawGem(o.obj,tick);
  }
  if(!playerDrawn) drawPlayer(tick);

  drawFX();

  // Subtle vignette
  var vg=CX.createRadialGradient(CV.width*0.5,CV.height*0.5,CV.width*0.3,CV.width*0.5,CV.height*0.5,CV.width*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.28)');
  CX.fillStyle=vg;CX.fillRect(0,0,CV.width,CV.height);

  if(notifT>0){notifT--;document.getElementById('notif').style.opacity=(notifT<40?notifT/40:1).toFixed(2);}

  stepPlayer();
  for(var i=0;i<COINS.length;i++) if(!COINS[i].done){ COINS[i].bob+=0.07; }
  for(var i=0;i<GEMS.length;i++)  if(!GEMS[i].done)  { GEMS[i].bob+=0.06; }

  requestAnimationFrame(loop);
}

// ── INIT ────────────────────────────────────────────────────────
buildWorld();
CAM.x=0; CAM.y=CAM_HEIGHT; CAM.z=-CAM_DIST; CAM.angle=0;
showNotif('✨ Bienvenue dans Dreamy Star!','#ff9edc');
setTimeout(function(){showNotif('Explore librement! 🌸','#ffe44d');},2500);
requestAnimationFrame(loop);
</script>
