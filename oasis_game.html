<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KIRBY DREAM WORLD</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#87ceeb}
canvas{display:block;position:fixed;top:0;left:0}

#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:10px 16px;display:flex;justify-content:space-between;align-items:flex-start}
#zone-name{font-family:‘Fredoka One’,cursive;font-size:18px;color:#fff;
text-shadow:0 3px 0 #cc55aa,0 5px 10px rgba(0,0,0,.2);
background:rgba(255,255,255,.22);backdrop-filter:blur(8px);
border-radius:20px;padding:6px 16px;border:2px solid rgba(255,255,255,.5);
transition:all .6s ease}
#stars-hud{font-family:‘Fredoka One’,cursive;font-size:14px;color:#ffe066;
text-shadow:0 2px 0 #cc8800;
background:rgba(255,255,255,.22);backdrop-filter:blur(8px);
border-radius:20px;padding:6px 14px;border:2px solid rgba(255,255,255,.5)}

/* Bulle d’air */
#bubble-ui{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
display:none;flex-direction:column;align-items:center;gap:4px;z-index:15}
#bubble-bar-bg{width:160px;height:16px;background:rgba(0,80,160,.4);border-radius:10px;
border:2px solid rgba(100,200,255,.6);overflow:hidden}
#bubble-bar{height:100%;background:linear-gradient(90deg,#44ccff,#88eeff);
border-radius:8px;transition:width .1s;width:100%}
#bubble-label{font-family:‘Fredoka One’,cursive;font-size:11px;color:#aaeeff;
text-shadow:0 1px 4px rgba(0,0,0,.4)}

/* Annonce de zone */
#zone-announce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
font-family:‘Fredoka One’,cursive;font-size:36px;color:#fff;
text-shadow:0 4px 0 #cc44aa,0 0 40px rgba(255,100,200,.6);
pointer-events:none;z-index:30;opacity:0;
transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s ease}
#zone-announce.show{transform:translate(-50%,-60%) scale(1);opacity:1}

/* Popup collectible */
#popup{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);
font-family:‘Fredoka One’,cursive;font-size:24px;color:#ffe066;
text-shadow:0 3px 0 #cc8800;pointer-events:none;z-index:30;opacity:0;
transition:transform .15s ease,opacity .3s ease}
#popup.show{transform:translate(-50%,-60%) scale(1.1);opacity:1}

/* Mobile */
#jL,#jR{position:fixed;bottom:20px;width:110px;height:110px;border-radius:50%;
background:rgba(255,255,255,.15);border:2.5px solid rgba(255,255,255,.4);
display:none;touch-action:none;z-index:20}
#jL{left:16px}#jR{right:16px}
#jLk,#jRk{position:absolute;width:44px;height:44px;border-radius:50%;
top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
box-shadow:0 3px 8px rgba(0,0,0,.2)}
#jLk{background:radial-gradient(circle at 35% 30%,#fffbe0,#ffcc44)}
#jRk{background:radial-gradient(circle at 35% 30%,#ffe0f0,#ff88cc)}
#btnA{position:fixed;bottom:140px;right:20px;width:62px;height:62px;border-radius:50%;
background:radial-gradient(circle at 38% 34%,#aaf0a0,#44bb33);
border:3px solid rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;
font-family:‘Fredoka One’,cursive;font-size:11px;color:#fff;touch-action:none;z-index:20;
box-shadow:0 4px 0 #227711}
#hint{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
font-family:‘Nunito’,sans-serif;font-size:9px;font-weight:700;
color:rgba(255,255,255,.5);pointer-events:none;letter-spacing:2px}
@media(pointer:coarse){#jL,#jR,#btnA{display:flex}#hint{display:none}}

/* Overlay eau */
#water-overlay{position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,60,160,.0);pointer-events:none;z-index:5;
transition:background .8s ease}
#water-overlay.underwater{background:rgba(0,40,120,.30)}
</style>

</head>
<body>
<div id="local-banner" style="position:fixed;top:0;left:0;right:0;z-index:999;background:linear-gradient(90deg,#1a0a2e,#0a1a3e);color:#fff;font-family:monospace;font-size:12px;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(100,150,255,.3)">
  <span>⚡ MODE PS5 — <strong>Télécharge ce fichier et ouvre-le dans Chrome/Firefox</strong> pour les effets complets (bloom, aberration, grain)</span>
  <button onclick="document.getElementById('local-banner').style.display='none'" style="background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:2px 8px;cursor:pointer;border-radius:3px">✕</button>
</div>
<div id="hud">
  <div id="zone-name">🌸 Plaine des Fleurs</div>
  <div id="stars-hud">⭐ <span id="sc">0</span></div>
</div>
<div id="bubble-ui">
  <div id="bubble-label">💨 Bulle d'air</div>
  <div id="bubble-bar-bg"><div id="bubble-bar"></div></div>
</div>
<div id="zone-announce"></div>
<div id="popup">⭐ +1</div>
<div id="water-overlay"></div>
<div id="jL"><div id="jLk"></div></div>
<div id="jR"><div id="jRk"></div></div>
<div id="btnA"><span>A</span></div>
<div id="hint">ZQSD · Espace=sauter · Souris=caméra</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(function(){
'use strict';

// ── Patch NaN ──────────────────────────────────────────
var _bsc=THREE.BufferGeometry.prototype.computeBoundingSphere;
THREE.BufferGeometry.prototype.computeBoundingSphere=function(){
  try{_bsc.call(this);}catch(e){}
  if(!this.boundingSphere||isNaN(this.boundingSphere.radius))
    this.boundingSphere=new THREE.Sphere(new THREE.Vector3(),9999);
};

// ── RENDERER PS5 ──────────────────────────────────────
var renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;
renderer.outputEncoding=THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);
var rtW=innerWidth,rtH=innerHeight;
var RT=new THREE.WebGLRenderTarget(rtW,rtH,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,format:THREE.RGBAFormat,type:THREE.HalfFloatType});
var RT2=new THREE.WebGLRenderTarget(Math.floor(rtW/2),Math.floor(rtH/2),{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,format:THREE.RGBAFormat});
var pScene=new THREE.Scene();
var pCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
var pGeo=new THREE.PlaneGeometry(2,2);
var blurMat=new THREE.ShaderMaterial({uniforms:{tDiffuse:{value:null},uDir:{value:new THREE.Vector2(1,0)},uRes:{value:new THREE.Vector2(Math.floor(rtW/2),Math.floor(rtH/2))}},vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}',fragmentShader:'precision highp float;uniform sampler2D tDiffuse;uniform vec2 uDir;uniform vec2 uRes;varying vec2 vUv;void main(){vec4 col=vec4(0.0);float w=0.0;for(int i=-6;i<=6;i++){float wt=exp(-float(i*i)*0.14);col+=texture2D(tDiffuse,vUv+uDir/uRes*float(i)*2.8)*wt;w+=wt;}gl_FragColor=col/w;}'});
var blurQ=new THREE.Mesh(pGeo,blurMat);
var postMat=new THREE.ShaderMaterial({uniforms:{tScene:{value:null},tBloom:{value:null},uTime:{value:0},uUnderwater:{value:0},uZone:{value:0},uRes:{value:new THREE.Vector2(rtW,rtH)}},vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}',fragmentShader:'precision highp float;uniform sampler2D tScene;uniform sampler2D tBloom;uniform float uTime;uniform float uUnderwater;uniform float uZone;uniform vec2 uRes;varying vec2 vUv;float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}vec3 aces(vec3 x){float a=2.51,b=0.03,cc=2.43,d=0.59,e=0.14;return clamp((x*(a*x+b))/(x*(cc*x+d)+e),0.0,1.0);}void main(){vec2 uv=vUv;vec2 ctr=uv-0.5;float cdist=length(ctr);float aber=0.0025+uUnderwater*0.004;vec3 col;col.r=texture2D(tScene,uv+ctr*aber*cdist).r;col.g=texture2D(tScene,uv).g;col.b=texture2D(tScene,uv-ctr*aber*cdist).b;vec3 bloom=texture2D(tBloom,uv).rgb;float blum=dot(bloom,vec3(0.299,0.587,0.114));col+=bloom*max(0.0,blum-0.5)*2.5;float lava=step(3.0,uZone)*(1.0-step(4.0,uZone));float forest=step(1.0,uZone)*(1.0-step(2.0,uZone));float tropic=step(5.0,uZone);col=mix(col,col*vec3(0.4,0.75,1.3),uUnderwater*0.55);col=mix(col,col*vec3(1.5,0.6,0.2),lava*0.65);col=mix(col,col*vec3(0.65,1.15,0.7),forest*0.3);col=mix(col,col*vec3(1.1,0.85,0.6),tropic*0.25);float lum=dot(col,vec3(0.299,0.587,0.114));col=mix(vec3(lum),col,1.35+uUnderwater*0.4);col=pow(max(col,vec3(0.0)),vec3(1.06));col=aces(col*1.18);vec2 vig=ctr*vec2(0.82,1.0);float v=pow(max(1.0-dot(vig,vig)*1.2,0.0),1.4);col*=v;float gr=hash(uv*uRes*0.48+floor(uTime*24.0))-0.5;col+=gr*0.042*(1.0+uUnderwater*0.6);float flare=max(0.0,dot(normalize(ctr+0.001),vec2(0.707,0.707)));col+=vec3(1.0,0.9,0.7)*pow(flare,12.0)*0.08;gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);}'});
var postQ=new THREE.Mesh(pGeo,postMat);
pScene.add(postQ);
var currentZoneIndex=0;
window.addEventListener('resize',function(){
  rtW=innerWidth;rtH=innerHeight;
  renderer.setSize(rtW,rtH);
  RT.setSize(rtW,rtH);RT2.setSize(Math.floor(rtW/2),Math.floor(rtH/2));
  camera.aspect=rtW/rtH;camera.updateProjectionMatrix();
  postMat.uniforms.uRes.value.set(rtW,rtH);
  blurMat.uniforms.uRes.value.set(Math.floor(rtW/2),Math.floor(rtH/2));
});

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.5,3000);

// ── LUMIÈRES ──────────────────────────────────────────
var ambLight=new THREE.AmbientLight(0xfff0f8,.18);scene.add(ambLight);
var sunLight=new THREE.DirectionalLight(0xfffbe8,4.2);
sunLight.position.set(200,500,100);
sunLight.castShadow=true;
sunLight.shadow.mapSize.set(2048,2048);
sunLight.shadow.camera.left=-600;sunLight.shadow.camera.right=600;
sunLight.shadow.camera.top=600;sunLight.shadow.camera.bottom=-600;
sunLight.shadow.camera.far=2000;sunLight.shadow.bias=-.001;
scene.add(sunLight);
var hemiLight=new THREE.HemisphereLight(0xaaccff,0x223311,.28);scene.add(hemiLight);
var fillL=new THREE.DirectionalLight(0x3355cc,.4);fillL.position.set(-200,100,300);scene.add(fillL);

// ── MATÉRIAUX ─────────────────────────────────────────
function mc(h){return new THREE.MeshStandardMaterial({color:h,roughness:.75,metalness:.0});}
function mct(h,o){return new THREE.MeshStandardMaterial({color:h,transparent:true,opacity:o,depthWrite:false,roughness:.08});}
function mce(h,ei){return new THREE.MeshStandardMaterial({color:h,emissive:new THREE.Color(h),emissiveIntensity:ei||.9,roughness:.35});}
function mcs(h){return new THREE.MeshStandardMaterial({color:h,side:THREE.DoubleSide,roughness:.8});}

// ── GÉOMÉTRIES HELPER ─────────────────────────────────
function mkB(w,h,d){return new THREE.BoxGeometry(w,h,d);}
function mkC(rt,rb,h,s){return new THREE.CylinderGeometry(rt,rb,h,Math.max(4,s));}
function mkS(r,w,h){return new THREE.SphereGeometry(r,w||10,h||8);}

function B(w,h,d,m,x,y,z){
  var mesh=new THREE.Mesh(mkB(w,h,d),m);
  mesh.position.set(x,y,z);mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);return mesh;
}
function Cy(rt,rb,h,s,m,x,y,z){
  var mesh=new THREE.Mesh(mkC(rt,rb,h,s),m);
  mesh.position.set(x,y,z);mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);return mesh;
}
function Sp(r,m,x,y,z){
  var mesh=new THREE.Mesh(mkS(r,12,9),m);
  mesh.position.set(x,y,z);scene.add(mesh);return mesh;
}

// ── CEL SHADING + CONTOURS NOIRS ──────────────────────
// Contour : mesh clone rendu côté BACK, scale légèrement agrandi
var _outlineMat=new THREE.MeshBasicMaterial({color:0x111111,side:THREE.BackSide});

function addOutline(mesh,thick){
  if(!mesh||!mesh.geometry)return;
  thick=thick||0.06;
  var ol=new THREE.Mesh(mesh.geometry,_outlineMat);
  ol.scale.multiplyScalar(1+thick);
  mesh.add(ol);
}

// Wrappers qui ajoutent automatiquement le contour
function BB(w,h,d,m,x,y,z){
  var mesh=new THREE.Mesh(mkB(w,h,d),m);
  mesh.position.set(x,y,z);mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);
  if(!m.transparent||m.opacity>0.4)addOutline(mesh,.055);
  return mesh;
}
function CCy(rt,rb,h,s,m,x,y,z){
  var mesh=new THREE.Mesh(mkC(rt,rb,h,s),m);
  mesh.position.set(x,y,z);mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);
  if(!m.transparent||m.opacity>0.4)addOutline(mesh,.06);
  return mesh;
}
function SSp(r,m,x,y,z,p){
  var mesh=new THREE.Mesh(mkS(r,12,9),m);
  mesh.position.set(x||0,y||0,z||0);
  (p||scene).add(mesh);
  if(!m.transparent||m.opacity>0.4)addOutline(mesh,.07);
  return mesh;
}

// ── SOL / COLLISION ───────────────────────────────────
// {x1,x2,z1,z2,y,underwater}
var FLOORS=[];
function addFloor(x,z,hw,hd,y,uw){
  FLOORS.push({x1:x-hw,x2:x+hw,z1:z-hd,z2:z+hd,y:y,uw:uw||false});
}
function getFloorY(px,pz){
  var best=-9999;
  for(var i=0;i<FLOORS.length;i++){
    var f=FLOORS[i];
    if(px>=f.x1-10&&px<=f.x2+10&&pz>=f.z1-10&&pz<=f.z2+10&&f.y>best)
      best=f.y;
  }
  return best;
}
function isUnderwater(px,pz){
  for(var i=0;i<FLOORS.length;i++){
    var f=FLOORS[i];
    if(f.uw&&px>=f.x1-20&&px<=f.x2+20&&pz>=f.z1-20&&pz<=f.z2+20) return true;
  }
  return false;
}

// ── COLLECTIBLES ──────────────────────────────────────
var STARS=[];var starScore=0;
var scEl=document.getElementById('sc');

function makeStar(x,y,z){
  var g=new THREE.Group();
  SSp(5,mce(0xffee44,.9),0,0,0,g).userData.main=true;
  SSp(8,mct(0xffee44,.3),0,0,0,g);
  g.position.set(x,y,z);g.userData.alive=true;g.userData.baseY=y;
  scene.add(g);STARS.push(g);
}

// Bulles d'air à récupérer
var BUBBLE_PICKUP=null;
var BUBBLE_PICKUP2=null;
function makeBubblePickup(x,y,z){
  var g=new THREE.Group();
  new THREE.Mesh(mkS(10,10,8),mct(0x88eeff,.55)).userData&&0;
  var bs=new THREE.Mesh(mkS(10,10,8),mct(0x88eeff,.55));g.add(bs);
  var bi=new THREE.Mesh(mkS(12,10,8),mct(0x44aaff,.18));g.add(bi);
  var bc=new THREE.Mesh(mkS(5,8,6),mce(0xffffff,.9));g.add(bc);
  g.position.set(x,y,z);g.userData.alive=true;g.userData.type='air';
  scene.add(g);BUBBLE_PICKUP=g;return g;
}
function makeBubblePickup2(x,y,z){
  var g=new THREE.Group();
  var bs=new THREE.Mesh(mkS(12,10,8),mct(0x44ffcc,.6));g.add(bs);
  var bi=new THREE.Mesh(mkS(15,10,8),mct(0x22ccaa,.2));g.add(bi);
  var bc=new THREE.Mesh(mkS(6,8,6),mce(0xaaffee,.9));g.add(bc);
  g.position.set(x,y,z);g.userData.alive=true;g.userData.type='air2';
  scene.add(g);BUBBLE_PICKUP2=g;return g;
}

// Dauphin
var DOLPHIN=null;
function makeDolphin(x,y,z){
  var g=new THREE.Group();
  var dm=mc(0x88bbdd);
  // Corps
  var dbody=new THREE.Mesh(mkS(12,10,8),dm);dbody.scale.set(2.2,.8,1);g.add(dbody);
  addOutline(dbody,.08);
  // Tête/museau
  var dhead=new THREE.Mesh(mkS(8,8,7),dm);dhead.scale.set(1.1,1,.9);dhead.position.set(-18,2,0);g.add(dhead);
  addOutline(dhead,.08);
  var dsnout=new THREE.Mesh(mkS(4,7,6),dm);dsnout.scale.set(1.4,.5,.7);dsnout.position.set(-25,1,0);g.add(dsnout);
  // Aileron dorsal
  var dfin=new THREE.Mesh(mkB(6,14,4),dm);dfin.position.set(0,10,0);dfin.rotation.z=.2;g.add(dfin);
  addOutline(dfin,.08);
  // Queue
  var dtail=new THREE.Mesh(mkB(8,4,16),dm);dtail.position.set(20,0,0);g.add(dtail);
  addOutline(dtail,.08);
  // Nageoires pectorales
  var dfinL=new THREE.Mesh(mkB(10,3,8),dm);dfinL.position.set(-5,-5,8);dfinL.rotation.z=.3;g.add(dfinL);
  var dfinR=new THREE.Mesh(mkB(10,3,8),dm);dfinR.position.set(-5,-5,-8);dfinR.rotation.z=.3;g.add(dfinR);
  // Oeil
  var deye=new THREE.Mesh(mkS(2,7,6),mc(0x112244));deye.position.set(-18,5,-7);g.add(deye);
  var dpup=new THREE.Mesh(mkS(1,6,5),mc(0xffffff));dpup.position.set(-18.5,5.2,-8);g.add(dpup);
  // Ventre clair
  var dbelly=new THREE.Mesh(mkS(9,8,7),mc(0xddeeff));dbelly.scale.set(2,.5,.9);dbelly.position.set(-4,-4,0);g.add(dbelly);

  g.position.set(x,y,z);
  g.userData.dolphin=true;
  g.userData.baseX=x;g.userData.baseY=y;g.userData.baseZ=z;
  g.userData.ph=Math.random()*Math.PI*2;
  g.userData.rescuing=false;
  scene.add(g);DOLPHIN=g;return g;
}

// ══════════════════════════════════════════════════════
//  ZONES — on avance vers Z négatif
// ══════════════════════════════════════════════════════

// ── ZONE 0 : PLAINE DES FLEURS (Z: 200 → -800) ────────
(function(){
  var Z0=200,Z1=-900;
  // Sol herbe continue
  BB(600,20,Math.abs(Z1-Z0),mc(0x66dd44), 0,-10,(Z0+Z1)/2);
  addFloor(0,(Z0+Z1)/2,300,Math.abs(Z1-Z0)/2,0);

  // Collines rondes
  var hills=[[-120,-200,40,0x77ee55],[80,-400,55,0x66dd44],[-50,-600,48,0x88ff66],[110,-750,38,0x55cc33]];
  hills.forEach(function(h){
    var hm=new THREE.Mesh(mkS(h[2],12,8),mc(h[3]));
    hm.scale.set(1.6,.55,1.6);hm.position.set(h[0],h[2]*.27,h[1]);scene.add(hm);
  });

  // Arbres cerisiers roses
  var trees=[[-140,-150],[-80,-300],[130,-280],[-160,-500],[90,-520],[-30,-680],[150,-720],[-120,-820]];
  trees.forEach(function(t){kirbyTree(t[0],t[1],'cherry');});

  // Fleurs partout
  for(var i=0;i<30;i++){
    var fx=(Math.random()-.5)*440,fz=Z1+Math.random()*(Z0-Z1);
    kirbyFlower(fx,fz,0,[0xff88cc,0xffee44,0xcc88ff,0xff6644,0xffffff][Math.floor(Math.random()*5)]);
  }

  // Nuages
  for(var i=0;i<8;i++){
    var cx=(Math.random()-.5)*500,cz=Z1+Math.random()*(Z0-Z1);
    kirbyCloud(cx,100+Math.random()*60,cz);
  }

  // Étoiles
  [[0,30,-100],[  -80,30,-350],[120,30,-550],[-60,30,-750]].forEach(function(p){makeStar(p[0],p[1],p[2]);});

  // Panneau de départ
  BB(8,60,8,mc(0xcc8833),0,30,160);
  BB(70,10,8,mc(0xeecc66),0,62,160);
})();

// ── ZONE 1 : FORÊT ENCHANTÉE (Z: -900 → -1700) ────────
(function(){
  var Z0=-900,Z1=-1700;
  BB(600,20,Math.abs(Z1-Z0),mc(0x3a5c2a), 0,-10,(Z0+Z1)/2);
  addFloor(0,(Z0+Z1)/2,300,Math.abs(Z1-Z0)/2,0);

  // Changer ciel dans cette zone (géré dans animate)
  // Gros arbres violets/orange
  var places=[[-150,-950],[80,-1050],[-60,-1150],[140,-1250],[-130,-1350],[60,-1450],[-90,-1600]];
  places.forEach(function(p,i){kirbyTree(p[0],p[1],i%2===0?'magic':'orange');});

  // Champignons géants

// ══════════════════════════════════════════════════════
//  FONCTIONS DE CONSTRUCTION
// ══════════════════════════════════════════════════════
function kirbyTree(x,z,type){
  var h=20+Math.random()*12;
  var trunkH=h;
  CCy(3,4,trunkH,8,mc(0xcc8833),x,trunkH/2,z);
  var leafMats={
    cherry:[mc(0xff6688),mc(0xff88aa)],
    magic: [mc(0xaa44ff),mc(0xcc88ff)],
    orange:[mc(0xff8833),mc(0xffaa55)],
    green: [mc(0x44dd66),mc(0x66ff88)],
  };
  var lm=leafMats[type]||leafMats.green;
  var r=14+Math.random()*8;
  SSp(r,lm[0],x,trunkH+r*.5,z);
  SSp(r*.72,lm[1],x+r*.28,trunkH+r*.85,z+r*.18);
  SSp(r*.65,lm[0],x-r*.22,trunkH+r*.9,z-r*.12);
}

function kirbyPalm(x,z){
  var h=30+Math.random()*15;
  // Tronc courbé
  for(var i=0;i<4;i++){
    var t=i/3,lean=Math.sin(t*1.2)*8;
    CCy(3-t,3.5-t*.5,h/4,6,mc(0xbb8822),x+lean,h/8+i*h/4,z);
  }
  // Feuilles
  for(var j=0;j<6;j++){
    var a=j/6*Math.PI*2;
    var leaf=new THREE.Mesh(mkB(28,3,6),mc(0x44bb33));
    leaf.position.set(x+Math.cos(a)*14,h+3,z+Math.sin(a)*14);
    leaf.rotation.y=a;leaf.rotation.z=.4;scene.add(leaf);
  }
  SSp(8,mc(0xffee44),x,h+4,z); // noix de coco
}

function kirbyMushroom(x,y,z,big){
  var h=(big?18:10)+Math.random()*8;
  CCy(2.5,3.5,h,8,mc(0xffeecc),x,y+h/2,z);
  var capR=(big?14:8)+Math.random()*5;
  var capMat=mc([0xff4444,0x4488ff,0xaa44ff,0xff8800][Math.floor(Math.random()*4)]);
  SSp(capR,capMat,x,y+h+capR*.45,z);
  for(var d=0;d<6;d++){
    var da=d/6*Math.PI*2,dr=capR*.5+Math.random()*capR*.15;
    var dot=new THREE.Mesh(mkS(1.6+Math.random(),6,5),mc(0xffffff));
    dot.position.set(x+Math.cos(da)*dr,y+h+capR*.55,z+Math.sin(da)*dr);scene.add(dot);
  }
}

function kirbyFlower(x,z,y,col){
  var h=8+Math.random()*10;
  CCy(.8,1.2,h,6,mc(0x44bb33),x,y+h/2,z);
  SSp(3,mc(0xffff88),x,y+h+2,z);
  var pm=mc(col||0xff88cc);
  for(var p=0;p<6;p++){

var P={
  x:0,y:12,z:160,
  vx:0,vy:0,vz:0,
  yaw:Math.PI,
  onGround:false,
  flying:false,    // Kirby gonfle et vole
  flyPuffed:false, // joues gonflées
  underwater:false,
  hasBubble:false,
  bubbleAir:1.0,
  walk:0
};

var WATER_SURFACE_Y=-28; // Y de la surface de l'eau (falaise/sous-marin)
var WATER_Z_START=-2720; // Z à partir duquel on est dans l'eau

function physicsStep(dt){
  var fy=getFloorY(P.x,P.z);
  var footY=fy+12;

  // Détection underwater
  var wasUnder=P.underwater;
  var waterSurfY=window._UW?window._UW.WY:-5;
  P.underwater=(P.z<WATER_Z_START && P.y<waterSurfY+12);

  // Gravité et flottaison
  if(P.underwater){
    P.flying=false;
    P.vy+=(0-P.vy)*.05;
    P.vy=Math.max(-4,Math.min(4,P.vy));
    P.vx*=.88;P.vz*=.88;
  } else if(P.flying){
    // Vol Kirby : gravité très douce → descente lente
    P.vy-=0.10;
    if(P.vy<-2.5) P.vy=-2.5; // vitesse de chute max faible
  } else {
    P.vy-=0.55;
    if(P.vy<-22)P.vy=-22;
  }

  P.y+=P.vy;
  P.x+=P.vx;
  P.z+=P.vz;

  // Collision sol
  if(fy>-9999&&P.y<=footY){
    P.y=footY;P.vy=0;P.onGround=true;
    P.flying=false;P.flyPuffed=false;
  } else {
    P.onGround=false;
  }

  // Surface eau — rebond si on n'a pas la bulle et on plonge
  if(P.z<WATER_Z_START&&P.y>WATER_SURFACE_Y&&P.y<WATER_SURFACE_Y+5&&P.vy<0&&!P.hasBubble){
    // Petite entrée dans l'eau quand même
  }

  // Gestion bulle d'air
  if(P.underwater&&P.hasBubble){
    P.bubbleAir=Math.max(0,P.bubbleAir-dt*.028); // ~35s de durée
    if(P.bubbleAir<=0){
      P.hasBubble=false;P.bubbleAir=0;
      // Sans bulle : remonter vers surface rapidement (noyade)
      P.vy=Math.max(P.vy,4);
      popupEl.textContent='💀 Plus d\'air !';popupEl.className='show';popTimer=1.5;
    }
  }
  // Sans bulle sous l'eau : Kirby monte tout seul (flottaison)
  if(P.underwater&&!P.hasBubble){
    P.vy=Math.max(P.vy,3.5); // flotte vers le haut
  }

  // Sortie de l'eau
  if(P.z<=-3500&&P.y>=-5) P.underwater=false;

  // Respawn
  if(P.y<-200){P.x=0;P.y=12;P.z=160;P.vx=0;P.vy=0;P.vz=0;P.underwater=false;}
}

// Joysticks
var jLX=0,jLY=0,jRX=0,jRY=0;
function mkJoy(eId,kId,cbX,cbY){
  var el=document.getElementById(eId),kn=document.getElementById(kId);
  if(!el||!kn)return;
  var rad=40,dead=14,tid=-1;
  function upd(cx,cy){
    var rc=el.getBoundingClientRect();
    var dx=cx-rc.left-rc.width*.5,dy=cy-rc.top-rc.height*.5,d=Math.sqrt(dx*dx+dy*dy);
    if(d<dead){cbX(0);cbY(0);kn.style.transform='translate(-50%,-50%)';return;}
    var cl=Math.min(d,rad),a=Math.atan2(dy,dx),n=(cl-dead)/(rad-dead);
    cbX(Math.cos(a)*n);cbY(Math.sin(a)*n);
    kn.style.transform='translate(calc(-50% + '+Math.round(Math.cos(a)*cl)+'px),calc(-50% + '+Math.round(Math.sin(a)*cl)+'px))';
  }
  function rst(){cbX(0);cbY(0);kn.style.transform='translate(-50%,-50%)';}
  ['touchstart','touchmove','touchend','touchcancel'].forEach(function(ev){
    el.addEventListener(ev,function(e){
      e.preventDefault();
      if(ev==='touchstart'){var rc=el.getBoundingClientRect();for(var i=0;i<e.changedTouches.length;i++){var tc=e.changedTouches[i];if(tc.clientX>=rc.left&&tc.clientX<=rc.right&&tc.clientY>=rc.top&&tc.clientY<=rc.bottom){tid=tc.identifier;upd(tc.clientX,tc.clientY);break;}}}
      else if(ev==='touchmove'){for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===tid){upd(e.changedTouches[i].clientX,e.changedTouches[i].clientY);break;}}
      else{for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===tid){tid=-1;rst();break;}}
    },{passive:false});
  });
}
mkJoy('jL','jLk',function(v){jLX=v;},function(v){jLY=v;});
mkJoy('jR','jRk',function(v){jRX=v;},function(v){jRY=v;});

},{passive:false});

      P.hasBubble=true;P.bubbleAir=1.0;

var clock=new THREE.Clock(),tick=0;
var camTX=0,camTY=12,camTZ=160;
var bgColor=new THREE.Color(0x87ceeb);

function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);
  tick++;var t=tick*.016;

  // ── Zone courante
  var zi=getCurrentZone();
  if(zi!==lastZoneIdx){
    lastZoneIdx=zi;
    var zo=ZONES[zi];
    zoneNameEl.textContent=zo.name;
    bgColor.set(zo.sky);scene.background=new THREE.Color(zo.sky);
    scene.fog=new THREE.Fog(zo.fog,500,1800);
    // Lumières spéciales par zone
    if(zi===1){ambLight.color.set(0x6644aa);sunLight.color.set(0xaa66ff);}
    else if(zi===4){ambLight.color.set(0x004488);sunLight.color.set(0x2266cc);}
    else{ambLight.color.set(0xfff0f8);sunLight.color.set(0xfffbe8);}
    // Annonce
    zoneAnnEl.textContent=zo.name;zoneAnnEl.className='show';zoneAnnTimer=2.0;
  }

  // ── Joystick droit → caméra
  if(Math.abs(jRX)>.12||Math.abs(jRY)>.12){
    CAM.yaw-=jRX*.018;
    CAM.pitch=Math.max(.08,Math.min(.9,CAM.pitch+jRY*.012));
    CAM.userControl=true;CAM.idleTime=0;
  }

  // ── Mouvement joueur (relatif caméra)
  var fwd=0,lat=0;
  if(KY['ArrowUp']  ||KY['KeyW']||KY['KeyZ'])fwd+=1;
  if(KY['ArrowDown'] ||KY['KeyS'])             fwd-=1;
  if(KY['ArrowRight']||KY['KeyD'])             lat+=1;
  if(KY['ArrowLeft'] ||KY['KeyA']||KY['KeyQ'])lat-=1;
  fwd-=jLY;lat+=jLX;

  var moveX=-Math.sin(CAM.yaw)*fwd+Math.cos(CAM.yaw)*lat;
  var moveZ=-Math.cos(CAM.yaw)*fwd-Math.sin(CAM.yaw)*lat;
  var moveMag=Math.sqrt(moveX*moveX+moveZ*moveZ);

  var spd=P.underwater?2.0:(P.flying?4.5:3.2);
  if(moveMag>.05){
    var nx=moveX/moveMag,nz=moveZ/moveMag;
    P.vx+=(nx*spd-P.vx)*.14;
    P.vz+=(nz*spd-P.vz)*.14;
    var ty2=Math.atan2(-nx,-nz);
    var dya=ty2-P.yaw;
    while(dya>Math.PI)dya-=Math.PI*2;while(dya<-Math.PI)dya+=Math.PI*2;
    P.yaw+=dya*.12;
  } else {
    P.vx*=P.underwater?.88:.82;P.vz*=P.underwater?.88:.82;
    if(Math.abs(P.vx)<.05)P.vx=0;if(Math.abs(P.vz)<.05)P.vz=0;
  }

  // Sous l'eau : espace = nage haut, bas = nage bas
  if(P.underwater){
    if(KY['Space'])P.vy=Math.min(P.vy+.4,4);
    if(KY['KeyS']||KY['ArrowDown'])P.vy=Math.max(P.vy-.4,-4);
  }

  physicsStep(dt);
  checkCollectibles();

  // ── Dauphin : sauvetage (remonte Kirby rapidement vers surface)
  if(DOLPHIN&&DOLPHIN.userData.rescuing){
    DOLPHIN.userData.rescueTimer+=dt;
    var progress=Math.min(1,DOLPHIN.userData.rescueTimer/2.5);
    // Dauphin monte vers la surface
    var targetY=window._UW?window._UW.WY-10:-10;
    DOLPHIN.position.y+=(targetY-DOLPHIN.position.y)*.08;
    // Kirby suit le dauphin
    P.x+=(DOLPHIN.position.x-P.x)*.12;
    P.y+=(DOLPHIN.position.y+12-P.y)*.12;
    P.z+=(DOLPHIN.position.z-P.z)*.12;
    P.vx=0;P.vy=0;P.vz=0;
    // Redonner de l'air
    P.bubbleAir=Math.min(1,P.bubbleAir+dt*.5);
    if(progress>=1){
      // Arrivé en surface
      DOLPHIN.userData.rescuing=false;
      // Repositionner le dauphin au fond
      if(window._UW) DOLPHIN.position.y=window._UW.FOND+30;
    }
  }

  // ── Kirby position
  PG.rotation.y=P.yaw;
  PG.position.set(P.x,P.y-12,P.z);

  // ── Animation Kirby
  var mov=moveMag>.1;
  if(mov)P.walk+=P.underwater?.06:.10;
  fR.rotation.x=mov?Math.sin(P.walk)*.45:0;
  fL.rotation.x=mov?-Math.sin(P.walk)*.45:0;

  if(P.flying){
    // Vol : Kirby se gonfle (joues) + bras battent rapidement
    var flap=Math.sin(t*8)*.55; // battement rapide
    armL.rotation.z= .5+flap;
    armR.rotation.z=-.5-flap;
    // Corps gonflé façon ballon
    var puff=1.18+Math.sin(t*3)*.03;
    body.scale.set(puff*1.05, puff*.92, puff);
    // Pieds remontés
    fL.position.y=3+Math.sin(t*5)*.5;
    fR.position.y=3+Math.sin(t*5+.5)*.5;
  } else if(P.underwater){
    armL.rotation.z=.2+Math.sin(P.walk*.8)*.22;
    armR.rotation.z=-.2-Math.sin(P.walk*.8)*.22;
    var bscale=1.12+Math.sin(t*1.5)*.03;
    body.scale.set(bscale,bscale,bscale);
    fL.position.y=1.5;fR.position.y=1.5;
  } else {
    armL.rotation.z=.2+Math.sin(P.walk*.8)*.22;
    armR.rotation.z=-.2-Math.sin(P.walk*.8)*.22;
    body.scale.set(1,1,1);
    fL.position.y=1.5;fR.position.y=1.5;
  }
  // Bulle visible si sous l'eau avec bulle
  kirbyBubble.visible=P.underwater&&P.hasBubble;
  if(kirbyBubble.visible)kirbyBubble.scale.set(1+Math.sin(t*2)*.05,1+Math.sin(t*2)*.05,1+Math.sin(t*2)*.05);

  // ── Ombre
  var fy=getFloorY(P.x,P.z);
  if(fy>-9999){
    shad.position.set(P.x,fy+.2,P.z);shad.visible=true;
    var sdist=P.y-12-fy;
    shadMat.opacity=Math.max(.01,.15-sdist*.001);
    var ss=Math.max(.2,1-sdist*.003);shad.scale.set(ss,ss,ss);
  } else shad.visible=false;

  // ── Caméra auto-follow
  camTX+=(P.x-camTX)*.10;
  camTY+=(P.y-camTY)*.10;
  camTZ+=(P.z-camTZ)*.10;
  if(CAM.userControl){CAM.idleTime+=dt;if(CAM.idleTime>1.5)CAM.userControl=false;}
  if(!CAM.userControl&&moveMag>.05){
    var tcy=P.yaw;
    var cdiff=tcy-CAM.yaw;
    while(cdiff>Math.PI)cdiff-=Math.PI*2;while(cdiff<-Math.PI)cdiff+=Math.PI*2;
    CAM.yaw+=cdiff*.06;
  }
  var cr=CAM.dist*Math.cos(CAM.pitch);
  camera.position.set(camTX+Math.sin(CAM.yaw)*cr,camTY+CAM.dist*Math.sin(CAM.pitch),camTZ+Math.cos(CAM.yaw)*cr);
  camera.lookAt(camTX,camTY+8,camTZ);

  // ── Animations décoratives
  scene.traverse(function(obj){
    if(obj.userData.cloud){
      obj.position.x+=obj.userData.speed||.03;
      obj.position.y=obj.userData.baseY+Math.sin(t*.35+obj.userData.ph)*5;
      if(obj.position.x>400)obj.position.x=-400;
    }
    if(obj.userData.firefly){
      obj.position.x=obj.userData.baseX+Math.sin(t*obj.userData.sp+obj.userData.ph)*15;
      obj.position.y=obj.userData.baseY+Math.sin(t*obj.userData.sp*.7+obj.userData.ph)*12;
      obj.position.z=obj.userData.baseZ+Math.cos(t*obj.userData.sp+obj.userData.ph)*15;
      obj.material.emissiveIntensity=.5+Math.sin(t*obj.userData.sp*2+obj.userData.ph)*.4;
    }
    if(obj.userData.fish){
      var r=obj.userData.r;
      obj.position.x=obj.userData.baseX+Math.cos(t*obj.userData.sp+obj.userData.ph)*r;
      obj.position.y=obj.userData.baseY+Math.sin(t*obj.userData.sp*.5)*8;
      obj.position.z=obj.userData.baseZ+Math.sin(t*obj.userData.sp+obj.userData.ph)*r*.3;
      obj.rotation.y=Math.atan2(
        Math.sin(t*obj.userData.sp+obj.userData.ph)*r,
        Math.cos(t*obj.userData.sp+obj.userData.ph)*r
      );
    }
    if(obj.userData.bubble){
      obj.position.y+=obj.userData.speed*.3;
      var topY=obj.userData.topY||-5;
      if(obj.position.y>topY) obj.position.y=(window._UW?window._UW.FOND:-100)+5+Math.random()*30;
      obj.position.x+=Math.sin(t+obj.userData.ph)*0.25;
    }
    if(obj.userData.dolphin&&!obj.userData.rescuing){
      // Dauphin nage en cercle lent au fond
      var dr=50,dsp=obj.userData.sp||.4;
      obj.position.x=obj.userData.baseX+Math.cos(t*dsp+obj.userData.ph)*dr;
      obj.position.z=obj.userData.baseZ+Math.sin(t*dsp+obj.userData.ph)*dr*.5;
      obj.position.y=obj.userData.baseY+Math.sin(t*dsp*1.3)*8;
      obj.rotation.y=Math.atan2(
        -Math.sin(t*dsp+obj.userData.ph)*dr*.5,
        -Math.cos(t*dsp+obj.userData.ph)*dr
      )+Math.PI/2;
      // Ondulation queue
      obj.rotation.z=Math.sin(t*dsp*4)*.12;
    }
  });

  // Étoiles flottantes
  STARS.forEach(function(s){
    if(!s.userData.alive)return;
    s.rotation.y=t*1.5;
    s.position.y=s.userData.baseY+Math.sin(t*2+s.position.x*.02)*4;
  });
  // Pièces Atlantide tournent et brillent
  if(window._UW){
    window._UW.COINS.forEach(function(coin){
      if(!coin.userData.alive)return;
      coin.rotation.y=t*2.2;
      coin.position.y=coin.userData.baseY+Math.sin(t*1.8+coin.position.x*.03)*3;
    });
  }
  // Bulles pickups pulsent
  if(BUBBLE_PICKUP&&BUBBLE_PICKUP.userData.alive){
    BUBBLE_PICKUP.scale.set(1+Math.sin(t*2)*.08,1+Math.sin(t*2)*.08,1+Math.sin(t*2)*.08);
  }
  if(BUBBLE_PICKUP2&&BUBBLE_PICKUP2.userData.alive){
    BUBBLE_PICKUP2.scale.set(1+Math.sin(t*2.2+1)*.1,1+Math.sin(t*2.2+1)*.1,1+Math.sin(t*2.2+1)*.1);
  }
  if(BUBBLE_PICKUP&&BUBBLE_PICKUP.userData.alive){
    BUBBLE_PICKUP.rotation.y=t*1.2;
    BUBBLE_PICKUP.position.y=BUBBLE_PICKUP.position.y=(-40)+Math.sin(t*1.5)*5;
  }

  // ── UI Bulle
  if(P.underwater&&P.hasBubble){
    bubbleUI.style.display='flex';
    bubbleBar.style.width=(P.bubbleAir*100)+'%';
    bubbleBar.style.background=P.bubbleAir>.3?'linear-gradient(90deg,#44ccff,#88eeff)':
      'linear-gradient(90deg,#ff4444,#ff8888)';
  } else if(!P.underwater){
    bubbleUI.style.display='none';
  }

  // Overlay eau
  if(P.underwater){
    waterOverlay.className='underwater';
    ambLight.intensity=P.underwater?.5:.8;
  } else {
    waterOverlay.className='';
    ambLight.intensity=.8;
  }

  // Timers UI
  if(popTimer>0){popTimer-=dt;if(popTimer<=0)popupEl.className='';}
  if(zoneAnnTimer>0){zoneAnnTimer-=dt;if(zoneAnnTimer<=0)zoneAnnEl.className='';}

  // PS5 PIPELINE
  renderer.setRenderTarget(RT);renderer.render(scene,camera);
  pScene.add(blurQ);pScene.remove(postQ);
  blurMat.uniforms.tDiffuse.value=RT.texture;blurMat.uniforms.uDir.value.set(1,0);
  renderer.setRenderTarget(RT2);renderer.render(pScene,pCam);
  pScene.add(postQ);pScene.remove(blurQ);
  postMat.uniforms.tScene.value=RT.texture;postMat.uniforms.tBloom.value=RT2.texture;
  postMat.uniforms.uTime.value=t;
  postMat.uniforms.uUnderwater.value=P.underwater?1.0:0.0;
  postMat.uniforms.uZone.value=currentZoneIndex;
  renderer.setRenderTarget(null);renderer.render(pScene,pCam);
}
animate();
})();
</script>
