<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#87ceeb}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:10px 16px;display:flex;justify-content:space-between;align-items:flex-start}
#zone-name{font-family:'Fredoka One',cursive;font-size:18px;color:#fff;text-shadow:0 3px 0 #cc55aa,0 5px 10px rgba(0,0,0,.2);background:rgba(255,255,255,.22);backdrop-filter:blur(8px);border-radius:20px;padding:6px 16px;border:2px solid rgba(255,255,255,.5);transition:all .6s ease}
#stars-hud{font-family:'Fredoka One',cursive;font-size:14px;color:#ffe066;text-shadow:0 2px 0 #cc8800;background:rgba(255,255,255,.22);backdrop-filter:blur(8px);border-radius:20px;padding:6px 14px;border:2px solid rgba(255,255,255,.5)}
#zone-announce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Fredoka One',cursive;font-size:36px;color:#fff;text-shadow:0 4px 0 #cc44aa,0 0 40px rgba(255,100,200,.6);pointer-events:none;z-index:30;opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s ease}
#zone-announce.show{transform:translate(-50%,-60%) scale(1);opacity:1}
#popup{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Fredoka One',cursive;font-size:24px;color:#ffe066;text-shadow:0 3px 0 #cc8800;pointer-events:none;z-index:30;opacity:0;transition:transform .15s ease,opacity .3s ease}
#popup.show{transform:translate(-50%,-60%) scale(1.1);opacity:1}
#jL,#jR{position:fixed;bottom:20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.15);border:2.5px solid rgba(255,255,255,.4);display:none;touch-action:none;z-index:20}
#jL{left:16px}#jR{right:16px}
#jLk,#jRk{position:absolute;width:44px;height:44px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 3px 8px rgba(0,0,0,.2)}
#jLk{background:radial-gradient(circle at 35% 30%,#fffbe0,#ffcc44)}
#jRk{background:radial-gradient(circle at 35% 30%,#ffe0f0,#ff88cc)}
#btnA{position:fixed;bottom:140px;right:20px;width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#aaf0a0,#44bb33);border:3px solid rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;color:#fff;touch-action:none;z-index:20;box-shadow:0 4px 0 #227711}
#btnB{position:fixed;bottom:215px;right:20px;width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#aad4ff,#2266cc);border:3px solid rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;color:#fff;touch-action:none;z-index:20;box-shadow:0 4px 0 #113388}
#btnD{position:fixed;bottom:290px;right:20px;width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#aaffee,#22bbaa);border:3px solid rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;color:#fff;touch-action:none;z-index:20;box-shadow:0 4px 0 #116655}
#btnC{position:fixed;bottom:215px;right:90px;width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#aaeeff,#22aacc);border:3px solid rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;color:#fff;touch-action:none;z-index:20;box-shadow:0 4px 0 #116688}
#btnUp{position:fixed;bottom:290px;right:90px;width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#ffeeaa,#ffaa00);border:3px solid rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:22px;color:#fff;touch-action:none;z-index:20;box-shadow:0 4px 0 #cc7700}
#btnDn{position:fixed;bottom:215px;right:90px;width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#ffccaa,#ff7722);border:3px solid rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:22px;color:#fff;touch-action:none;z-index:20;box-shadow:0 4px 0 #cc4400}
#hint{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;color:rgba(255,255,255,.5);pointer-events:none;letter-spacing:2px}
@media(pointer:coarse){#jL,#jR,#btnA,#btnB,#btnC,#btnD{display:flex}#hint{display:none}}
#water-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,60,160,.0);pointer-events:none;z-index:5;transition:background .8s ease}
#water-overlay.underwater{background:rgba(0,40,120,.30)}
#dive-hint{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:13px;color:#aaeeff;text-shadow:0 2px 6px rgba(0,0,0,.5);pointer-events:none;z-index:15;display:none;text-align:center;background:rgba(0,30,80,.5);padding:5px 14px;border-radius:14px;border:1px solid rgba(100,200,255,.4)}
#minimap{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);width:220px;height:60px;background:rgba(0,0,0,.55);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;z-index:20;pointer-events:none;overflow:hidden}
#minimap canvas{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<div id="hud">
  <div id="zone-name">🌸 Plaine des Fleurs</div>
  <div id="stars-hud">⭐ <span id="sc">0</span></div>
</div>
<div id="zone-announce"></div>
<div id="popup">⭐ +1</div>
<div id="water-overlay"></div>
<div id="jL"><div id="jLk"></div></div>
<div id="jR"><div id="jRk"></div></div>
<div id="btnA"><span>🅐</span></div>
<div id="btnB"><span>🅑</span></div>
<div id="btnC"><span>⬇</span></div>
<div id="btnUp"><span>▲</span></div>
<div id="btnDn"><span>▼</span></div>
<div id="btnD"><span>🏊</span></div>
<div id="dive-hint"></div>
<div id="minimap"><canvas id="mmcv" width="440" height="120"></canvas></div>
<div id="hint">ZQSD · Espace=sauter · E=sous-marin · L=phares</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

// ── Patch boundingSphere
var _bsc=THREE.BufferGeometry.prototype.computeBoundingSphere;
THREE.BufferGeometry.prototype.computeBoundingSphere=function(){
try{_bsc.call(this);}catch(e){}
if(!this.boundingSphere||isNaN(this.boundingSphere.radius))
this.boundingSphere=new THREE.Sphere(new THREE.Vector3(),9999);
};

// ── Renderer
var renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:‘high-performance’});
renderer.setPixelRatio(Math.min(devicePixelRatio,1));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=false;
renderer.toneMapping=THREE.LinearToneMapping;
renderer.toneMappingExposure=0.9;
document.body.appendChild(renderer.domElement);

// ── Gestion Context Lost WebGL (évite le crash)
var _glLost=false;
renderer.domElement.addEventListener(‘webglcontextlost’,function(e){
e.preventDefault();_glLost=true;
console.warn(‘WebGL context lost’);
},false);
renderer.domElement.addEventListener(‘webglcontextrestored’,function(){
_glLost=false;
console.info(‘WebGL context restored’);
},false);

window.addEventListener(‘resize’,function(){
renderer.setSize(innerWidth,innerHeight);
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
});

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.5,6000);

// ── Lights
var ambLight=new THREE.AmbientLight(0xe8f4ff,.65);scene.add(ambLight);
var sunLight=new THREE.DirectionalLight(0xfff8e8,2.5);
sunLight.position.set(200,500,100);
scene.add(sunLight);
var hemiLight=new THREE.HemisphereLight(0xaadeff,0x55cc77,.7);scene.add(hemiLight);
var rimLight=new THREE.DirectionalLight(0xaaccff,.4);rimLight.position.set(-300,200,-100);scene.add(rimLight);

// ── Toon gradient
var gradData=new Uint8Array([30,30,40,255,70,70,82,255,130,128,140,255,190,188,200,255,240,238,250,255,255,255,255,255]);
var gradTex=new THREE.DataTexture(gradData,6,1,THREE.RGBAFormat);
gradTex.needsUpdate=true;gradTex.magFilter=THREE.NearestFilter;gradTex.minFilter=THREE.NearestFilter;

// Matériau contour nuage — déclaré tôt car kirbyCloud() est appelée dès la construction du monde
var _cloudOutMat=null; // initialisé lazily après THREE.js prêt

// ── Material helpers (avec cache pour éviter le Context Lost WebGL)
var _mcCache={};
var _mceCache={};
var _mctCache={};
function mc(h){var k=h;if(_mcCache[k])return _mcCache[k];var m=new THREE.MeshToonMaterial({color:h,gradientMap:gradTex});*mcCache[k]=m;return m;}
function mct(h,o){var k=h+’*’+Math.round(o*100);if(_mctCache[k])return _mctCache[k];var m=new THREE.MeshToonMaterial({color:h,transparent:true,opacity:o,depthWrite:false,gradientMap:gradTex});*mctCache[k]=m;return m;}
function mce(h,ei){var k=h+’*’+Math.round((ei||.6)*100);if(_mceCache[k])return _mceCache[k];var m=new THREE.MeshToonMaterial({color:h,emissive:new THREE.Color(h),emissiveIntensity:ei||.6,gradientMap:gradTex});*mceCache[k]=m;return m;}
function mcs(h){return mc(h);}
// ── Geometry helpers (avec cache pour réduire les allocations WebGL)
var *geoCache={};
function mkB(w,h,d){var k=‘b’+w+’*’+h+’*’+d;if(!*geoCache[k])*geoCache[k]=new THREE.BoxGeometry(w,h,d,1,1,1);return *geoCache[k];}
function mkC(rt,rb,h,s){var k=‘c’+rt+’*’+rb+’*’+h+’*’+s;if(!_geoCache[k])*geoCache[k]=new THREE.CylinderGeometry(rt,rb,h,Math.max(6,s));return *geoCache[k];}
function mkS(r,w,h){var k=‘s’+r+’*’+(w||14)+’*’+(h||10);if(!_geoCache[k])_geoCache[k]=new THREE.SphereGeometry(r,w||14,h||10);return _geoCache[k];}

// ── Outline mat
var _outlineMat=new THREE.MeshBasicMaterial({color:0x080808,side:THREE.BackSide});
// ── Tunnel globals
var TWALLZ=-3100,TWALL_R=55,TWALL_CY=-295;
function addOutline(mesh,thick){
if(!mesh||!mesh.geometry)return;
thick=thick||0.045;
var ol=new THREE.Mesh(mesh.geometry,_outlineMat);
ol.scale.multiplyScalar(1+thick);
mesh.add(ol);
}

// ── Builders
function BB(w,h,d,m,x,y,z){
var mesh=new THREE.Mesh(mkB(w,h,d),m);
mesh.position.set(x,y,z);
scene.add(mesh);
return mesh;
}
function CCy(rt,rb,h,s,m,x,y,z){
var mesh=new THREE.Mesh(mkC(rt,rb,h,s),m);
mesh.position.set(x,y,z);scene.add(mesh);
return mesh;
}
function SSp(r,m,x,y,z,p){
var mesh=new THREE.Mesh(mkS(r,14,10),m);
mesh.position.set(x||0,y||0,z||0);
(p||scene).add(mesh);
return mesh;
}

// ── Floors
var FLOORS=[];
function addFloor(x,z,hw,hd,y,uw){
FLOORS.push({x1:x-hw,x2:x+hw,z1:z-hd,z2:z+hd,y:y,uw:uw||false});
// Collisions latérales UNIQUEMENT pour les petites plateformes (pas les sols d’îles ni les grands sols)
if(!uw&&hw<100&&hd<100){
addPlatformCollision(x,z,hw,hd,y-80,y+1);
}
}
function getFloorY(px,pz){
var best=-9999;
for(var i=0;i<FLOORS.length;i++){
var f=FLOORS[i];
if(px>=f.x1-10&&px<=f.x2+10&&pz>=f.z1-10&&pz<=f.z2+10&&f.y>best)
best=f.y;
}
return best;
}

// ── Walls (collision latérale pour plateformes)
var WALLS=[];
// addWall : ajoute les 4 murs d’une plateforme rectangulaire
// x,z = centre, hw,hd = demi-largeur/profondeur, yBottom,yTop = hauteur
function addPlatformCollision(x,z,hw,hd,yBottom,yTop){
var margin=13; // rayon de Kirby
// Mur Nord (z max)
WALLS.push({axis:‘z’,side:1, val:z+hd, xMin:x-hw,xMax:x+hw, yMin:yBottom,yMax:yTop});
// Mur Sud (z min)
WALLS.push({axis:‘z’,side:-1,val:z-hd, xMin:x-hw,xMax:x+hw, yMin:yBottom,yMax:yTop});
// Mur Est (x max)
WALLS.push({axis:‘x’,side:1, val:x+hw, zMin:z-hd,zMax:z+hd, yMin:yBottom,yMax:yTop});
// Mur Ouest (x min)
WALLS.push({axis:‘x’,side:-1,val:x-hw, zMin:z-hd,zMax:z+hd, yMin:yBottom,yMax:yTop});
}

function applyWallCollisions(){
var r=15;
for(var i=0;i<WALLS.length;i++){
var w=WALLS[i];
if(P.y<w.yMin||P.y>w.yMax+r)continue;
if(w.axis===‘z’){
if(P.x<w.xMin-r||P.x>w.xMax+r)continue;
if(w.side===1&&P.z>w.val-r&&P.z<w.val+r){P.z=w.val-r;P.vz=Math.min(P.vz,0);}
else if(w.side===-1&&P.z<w.val+r&&P.z>w.val-r){P.z=w.val+r;P.vz=Math.max(P.vz,0);}
} else {
if(P.z<w.zMin-r||P.z>w.zMax+r)continue;
if(w.side===1&&P.x>w.val-r&&P.x<w.val+r){P.x=w.val-r;P.vx=Math.min(P.vx,0);}
else if(w.side===-1&&P.x<w.val+r&&P.x>w.val-r){P.x=w.val+r;P.vx=Math.max(P.vx,0);}
}
}
}

// ── Stars
var STARS=[];var starScore=0;
var scEl=document.getElementById(‘sc’);

// ── Animation lists
var ANIM_CLOUDS=[];
var ANIM_FIREFLIES=[];
var ANIM_FISH=[];
var ANIM_BUBBLES=[];
var ANIM_GLOWS=[];
var ANIM_JELLIES=[];
function makeStar(x,y,z){
var g=new THREE.Group();
var sm=new THREE.MeshToonMaterial({color:0xffee22,emissive:new THREE.Color(0xffcc00),emissiveIntensity:.8,gradientMap:gradTex});
SSp(5,sm,0,0,0,g);
SSp(8,mct(0xffee44,.28),0,0,0,g);
var spl=new THREE.PointLight(0xffee44,1.5,60);g.add(spl);
g.position.set(x,y,z);g.userData.alive=true;g.userData.baseY=y;
scene.add(g);STARS.push(g);
}

// ── Bubble pickups
var BUBBLE_PICKUP=null,BUBBLE_PICKUP2=null;
function makeBubblePickup(x,y,z){
var g=new THREE.Group();
var bs=new THREE.Mesh(mkS(10,12,10),mct(0x88eeff,.5));g.add(bs);
var bi=new THREE.Mesh(mkS(13,12,10),mct(0x44aaff,.15));g.add(bi);
var bc=new THREE.Mesh(mkS(4,8,6),mce(0xffffff,1.0));g.add(bc);
var bl=new THREE.PointLight(0x44ccff,2.5,80);g.add(bl);
g.position.set(x,y,z);g.userData.alive=true;g.userData.type=‘air’;g.userData.baseY=y;
scene.add(g);BUBBLE_PICKUP=g;return g;
}
function makeBubblePickup2(x,y,z){
var g=new THREE.Group();
var bs=new THREE.Mesh(mkS(12,12,10),mct(0x44ffcc,.55));g.add(bs);
var bi=new THREE.Mesh(mkS(16,12,10),mct(0x22ccaa,.18));g.add(bi);
var bc=new THREE.Mesh(mkS(5,8,6),mce(0xaaffee,1.0));g.add(bc);
var bl=new THREE.PointLight(0x22ffcc,3,100);g.add(bl);
g.position.set(x,y,z);g.userData.alive=true;g.userData.type=‘air2’;g.userData.baseY=y;
scene.add(g);BUBBLE_PICKUP2=g;return g;
}

// ── Dauphin
var DOLPHIN=null;
function makeDolphin(x,y,z){
var g=new THREE.Group();
var dm=mc(0x5599cc);
var dbody=new THREE.Mesh(mkS(12,12,10),dm);dbody.scale.set(2.4,.85,1.1);g.add(dbody);addOutline(dbody,.07);
var dhead=new THREE.Mesh(mkS(9,10,9),dm);dhead.scale.set(1.15,1,.95);dhead.position.set(-20,2,0);g.add(dhead);addOutline(dhead,.07);
var dsnout=new THREE.Mesh(mkS(5,8,7),dm);dsnout.scale.set(1.5,.5,.65);dsnout.position.set(-28,1,0);g.add(dsnout);
var dfin=new THREE.Mesh(mkB(7,16,4),mc(0x4488bb));dfin.position.set(0,11,0);dfin.rotation.z=.18;g.add(dfin);addOutline(dfin,.07);
var dtail=new THREE.Mesh(mkB(10,5,18),dm);dtail.position.set(22,0,0);g.add(dtail);addOutline(dtail,.07);
var dfinL=new THREE.Mesh(mkB(12,3,9),mc(0x4488bb));dfinL.position.set(-5,-5,9);dfinL.rotation.z=.28;g.add(dfinL);
var dfinR=dfinL.clone();dfinR.position.z=-9;g.add(dfinR);
var deye=new THREE.Mesh(mkS(2.2,8,7),mc(0x0a1833));deye.position.set(-20,5.5,-7.5);g.add(deye);
var dpup=new THREE.Mesh(mkS(1,6,5),mc(0xffffff));dpup.position.set(-20.5,5.8,-8.5);g.add(dpup);
var dbelly=new THREE.Mesh(mkS(10,10,9),mc(0xddeeff));dbelly.scale.set(2.2,.45,1.0);dbelly.position.set(-4,-5,0);g.add(dbelly);
var dshine=new THREE.Mesh(mkS(4,6,5),mc(0xeefcff));dshine.position.set(-8,9,-2);g.add(dshine);
g.position.set(x,y,z);
g.userData.dolphin=true;g.userData.baseX=x;g.userData.baseY=y;g.userData.baseZ=z;
g.userData.ph=Math.random()*Math.PI*2;g.userData.rescuing=false;g.userData.sp=0.4;
scene.add(g);DOLPHIN=g;return g;
}

// ════════════════════════════════════════════════════════════
// ZONE 0 — Plaine
// ════════════════════════════════════════════════════════════
(function(){
var Z0=200,Z1=-900;
var groundMat=mc(0x55cc33);
BB(620,22,Math.abs(Z1-Z0),groundMat,0,-11,(Z0+Z1)/2);
addFloor(0,(Z0+Z1)/2,310,Math.abs(Z1-Z0)/2,0);
var hills=[[-120,-200,44,0x66dd44],[80,-400,58,0x55cc33],[-50,-600,50,0x77ee55],[110,-750,40,0x44bb22]];
hills.forEach(function(h){
var hm=new THREE.Mesh(mkS(h[2],14,10),mc(h[3]));
hm.scale.set(1.7,.52,1.7);hm.position.set(h[0],h[2]*.25,h[1]);
hm.receiveShadow=true;scene.add(hm);
});
var trees=[[-140,-150],[-80,-300],[130,-280],[-160,-500],[90,-520],[-30,-680],[150,-720],[-120,-820]];
trees.forEach(function(t){kirbyTree(t[0],t[1],‘cherry’);});
for(var i=0;i<35;i++){
var fx=(Math.random()-.5)*440,fz=Z1+Math.random()*(Z0-Z1);
kirbyFlower(fx,fz,0,[0xff88cc,0xffee44,0xcc88ff,0xff6644,0xffffff,0xff4488][Math.floor(Math.random()*6)]);
}
for(var i=0;i<10;i++)kirbyCloud((Math.random()-.5)*550,100+Math.random()*70,(Z1+Math.random()*(Z0-Z1)));
[[0,35,-100],[-80,35,-350],[120,35,-550],[-60,35,-750]].forEach(function(p){makeStar(p[0],p[1],p[2]);});
BB(9,65,9,mc(0xbb7722),0,32,160);
BB(75,11,9,mc(0xddbb55),0,67,160);
})();

// ════════════════════════════════════════════════════════════
// ZONE 1 — Forêt magique
// ════════════════════════════════════════════════════════════
(function(){
var Z0=-900,Z1=-1700;
BB(620,22,Math.abs(Z1-Z0),mc(0x2a4a1a),0,-11,(Z0+Z1)/2);
addFloor(0,(Z0+Z1)/2,310,Math.abs(Z1-Z0)/2,0);
var places=[[-150,-950],[80,-1050],[-60,-1150],[140,-1250],[-130,-1350],[60,-1450],[-90,-1600]];
places.forEach(function(p,i){kirbyTree(p[0],p[1],i%2===0?‘magic’:‘orange’);});
[[-100,-1000],[120,-1100],[-40,-1300],[100,-1500]].forEach(function(p){kirbyMushroom(p[0],0,p[1],true);});
[[-180,-1000,22],[160,-1200,18],[-140,-1500,26],[90,-1650,20]].forEach(function(r){
var rm=new THREE.Mesh(mkS(r[2],10,8),mc(0x778899));rm.scale.set(1.5,.6,1.4);rm.position.set(r[0],r[2]*.35,r[1]);
scene.add(rm);
var moss=new THREE.Mesh(mkS(r[2]*.7,8,6),mc(0x336633));moss.scale.set(1.3,.3,1.3);moss.position.set(r[0],r[2]*.6+r[2]*.15,r[1]);scene.add(moss);
});

function physicsStep(dt){
if(P.inSub){P.x=SB.x;P.y=SB.y+10;P.z=SB.z;P.onGround=false;P.flying=false;return;}
var fy=getFloorY(P.x,P.z);
var footY=fy+13;

// Zones d’eau
var inWaterZone=(P.z<WATER_Z_START&&!OCEAN_MODE)||OCEAN_MODE;
var surfY=OCEAN_MODE?0:WATER_SURFACE_Y;
P.underwater=inWaterZone&&P.y<surfY+4;

if(P.underwater){
// ── Sous l’eau
P.flying=false;
P.vy-=0.012;if(P.vy<-5.5)P.vy=-5.5;
P.vx*=P.swimMode?0.92:0.84;
P.vz*=P.swimMode?0.92:0.78;
// Appliquer mouvement
P.y+=P.vy;P.x+=P.vx;P.z+=P.vz;
// Sol sous-marin
if(fy>-9999&&P.y<=footY){P.y=footY;if(P.vy<0)P.vy=0;}
P.onGround=false;
} else {
// ── À l’air libre
if(P.flying){
P.vy-=0.06;if(P.vy<-3.5)P.vy=-3.5;
} else {
P.vy-=0.45;if(P.vy<-18)P.vy=-18;
}
P.vx*=0.88;P.vz*=0.88;
// Appliquer mouvement D’ABORD
P.y+=P.vy;P.x+=P.vx;P.z+=P.vz;
// PUIS vérifier le sol (après déplacement)
if(fy>-9999&&P.y<=footY&&P.vy<=0){
P.y=footY;P.vy=0;P.onGround=true;P.flying=false;P.flyPuffed=false;
} else {
P.onGround=false;
}
}

if(P.x<-490){P.x=-490;P.vx=0;}

// ── Transitions tuyau
if(!OCEAN_MODE&&P.x>820){
OCEAN_MODE=true;window._isleEntry=true;
popupEl.textContent=‘🌴 Îles Tropicales !’;popupEl.className=‘show’;popTimer=2.5;
}
if(OCEAN_MODE&&window._isleEntry&&P.x>900){window._isleEntry=false;}
if(OCEAN_MODE&&!window._isleEntry&&P.x<820&&P.x>478){
var retDZ=P.z-TWALLZ,retDY=P.y-TWALL_CY;
if(Math.sqrt(retDZ*retDZ+retDY*retDY)<TWALL_R-5){OCEAN_MODE=false;}
}

// ── Tunnel cylindrique
if(!OCEAN_MODE&&P.x>478&&P.x<820){
var tunDZ=P.z-TWALLZ,tunDY=P.y-TWALL_CY;
var tunDist=Math.sqrt(tunDZ*tunDZ+tunDY*tunDY);
if(tunDist>=TWALL_R-2){
P.x=478;P.vx=0;
} else {
if(tunDist>TWALL_R-14){
var ang=Math.atan2(tunDY,tunDZ);
P.z=TWALLZ+Math.cos(ang)*(TWALL_R-14);
P.y=TWALL_CY+Math.sin(ang)*(TWALL_R-14);
P.vz=0;P.vy=0;
}
var tunFloorY=TWALL_CY-TWALL_R+14;
if(P.y<=tunFloorY&&P.vy<=0){P.y=tunFloorY;P.vy=0;P.onGround=true;P.flying=false;P.flyPuffed=false;}
}
}

// ── Collisions murs
if(!P.inSub&&!P.underwater)applyWallCollisions();

// ── Limite vol
if(P.flying){
var flyMaxY=fy>-9999?(fy+320):400;
if(P.y>flyMaxY){P.y=flyMaxY;if(P.vy>0)P.vy=0;}
}

// ── Chute dans le vide → respawn
if(P.y<(window._IN_FIRE_WORLD?-800:(OCEAN_MODE?-700:-520))){
P.x=0;P.y=13;P.z=160;P.vx=P.vy=P.vz=0;P.inSub=false;OCEAN_MODE=false;window._IN_FIRE_WORLD=false;
}
}

var SUB_BOUNDS={xMin:-460,xMax:2000,zMin:-7100,zMax:-2730};
function subStep(fwd,lat,goUp,goDn){
var spd=6.5;
var mx=-Math.sin(CAM.yaw)*fwd+Math.cos(CAM.yaw)*lat;
var mz=-Math.cos(CAM.yaw)*fwd-Math.sin(CAM.yaw)*lat;
var mag=Math.sqrt(mx*mx+mz*mz);
if(mag>0.05){
var nx=mx/mag,nz=mz/mag;
SB.vx+=(nx*spd-SB.vx)*0.18;SB.vz+=(nz*spd-SB.vz)*0.18;
var ty=Math.atan2(-nx,-nz),dy=ty-SB.yaw;
while(dy>Math.PI)dy-=Math.PI*2;while(dy<-Math.PI)dy+=Math.PI*2;
SB.yaw+=dy*0.12;
} else {SB.vx*=0.82;SB.vz*=0.82;}
if(goUp)SB.vy=Math.min(SB.vy+0.55,6.5);
else if(goDn)SB.vy=Math.max(SB.vy-0.55,-6.5);
else SB.vy*=0.85;
SB.x+=SB.vx;SB.y+=SB.vy;SB.z+=SB.vz;
SB.vx*=0.85;SB.vz*=0.85;
if(SB.x<SUB_BOUNDS.xMin){SB.x=SUB_BOUNDS.xMin;SB.vx=Math.abs(SB.vx)*.3;}
if(SB.x>SUB_BOUNDS.xMax){SB.x=SUB_BOUNDS.xMax;SB.vx=-Math.abs(SB.vx)*.3;}
if(SB.x>478&&SB.x<820){
var stDZ=SB.z-TWALLZ,stDY=SB.y-TWALL_CY;
var stDist=Math.sqrt(stDZ*stDZ+stDY*stDY);
if(stDist>TWALL_R-5){SB.x=478;SB.vx=-Math.abs(SB.vx)*.3;}
else if(stDist>TWALL_R-20){
var sang=Math.atan2(stDY,stDZ);
SB.z=TWALLZ+Math.cos(sang)*(TWALL_R-20);SB.y=TWALL_CY+Math.sin(sang)*(TWALL_R-20);
SB.vz=0;SB.vy=0;
}
}
if(SB.z>SUB_BOUNDS.zMax){SB.z=SUB_BOUNDS.zMax;SB.vz=Math.min(SB.vz,0);}
if(SB.z<SUB_BOUNDS.zMin){SB.z=SUB_BOUNDS.zMin;SB.vz=Math.max(SB.vz,0);}
var minY=OCEAN_MODE?(window._OCEAN_FOND||(-500)+20):-380;
var maxY=-20;
if(SB.y<minY){SB.y=minY;SB.vy=0;}
if(SB.y>maxY){SB.y=maxY;SB.vy=0;}
}

function mkJoy(eId,kId,cbX,cbY){
var el=document.getElementById(eId),kn=document.getElementById(kId);
if(!el||!kn)return;
var rad=40,dead=14,tid=-1;
function upd(cx,cy){
var rc=el.getBoundingClientRect();
var dx=cx-rc.left-rc.width*.5,dy=cy-rc.top-rc.height*.5,d=Math.sqrt(dx*dx+dy*dy);
if(d<dead){cbX(0);cbY(0);kn.style.transform=‘translate(-50%,-50%)’;return;}
var cl=Math.min(d,rad),a=Math.atan2(dy,dx),n=(cl-dead)/(rad-dead);
cbX(Math.cos(a)*n);cbY(Math.sin(a)*n);
kn.style.transform=’translate(calc(-50% + ’+Math.round(Math.cos(a)*cl)+’px),calc(-50% + ’+Math.round(Math.sin(a)*cl)+‘px))’;
}
function rst(){cbX(0);cbY(0);kn.style.transform=‘translate(-50%,-50%)’;}
[‘touchstart’,‘touchmove’,‘touchend’,‘touchcancel’].forEach(function(ev){
el.addEventListener(ev,function(e){
e.preventDefault();
if(ev===‘touchstart’){var rc=el.getBoundingClientRect();for(var i=0;i<e.changedTouches.length;i++){var tc=e.changedTouches[i];if(tc.clientX>=rc.left&&tc.clientX<=rc.right&&tc.clientY>=rc.top&&tc.clientY<=rc.bottom){tid=tc.identifier;upd(tc.clientX,tc.clientY);break;}}}
else if(ev===‘touchmove’){for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===tid){upd(e.changedTouches[i].clientX,e.changedTouches[i].clientY);break;}}
else{for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===tid){tid=-1;rst();break;}}
},{passive:false});
});
}

else if(SUB_NEAR){diveHintEl.style.display=‘block’;diveHintEl.textContent=‘🚢 Sous-marin proche ! 🅑 pour entrer · [E] clavier’;}
else if(DRAGON_RIDING){diveHintEl.style.display=‘block’;diveHintEl.textContent=‘🐉 Cap sur le volcan ! Appuie sur B ou E au bon moment pour sauter dans le cratère’;}
else if(OCEAN_MODE&&DRAGON&&!DRAGON_RIDING){
var dpxH=P.x-DRAGON.position.x,dpzH=P.z-DRAGON.position.z;
if(dpxH*dpxH+dpzH*dpzH<180*180){diveHintEl.style.display=‘block’;diveHintEl.textContent=‘🐉 Dragon ! Approche-toi pour monter dessus’;}
else{diveHintEl.style.display=‘none’;}
}
else if((P.z<WATER_Z_START||OCEAN_MODE)&&P.underwater){diveHintEl.style.display=‘block’;diveHintEl.textContent=‘🌊 🅐=remonter · C=plonger’;}
else if(P.z<WATER_Z_START&&!OCEAN_MODE){diveHintEl.style.display=‘block’;diveHintEl.textContent=‘🌊 Avance pour plonger | Tuyau vers les îles → à droite !’;}
else{diveHintEl.style.display=‘none’;}

// ── Minimap
(function(){
var mc2=document.getElementById(‘mmcv’);if(!mc2)return;
var ctx=mc2.getContext(‘2d’);
var W=440,H=120;
ctx.clearRect(0,0,W,H);
var wxMin=-490,wxMax=500,wzMin=-4200,wzMax=300;
var wxRange=wxMax-wxMin,wzRange=wzMax-wzMin;
function wx(x){return(x-wxMin)/wxRange*W;}
function wz(z){return(z-wzMin)/wzRange*H;}
ctx.fillStyle=‘rgba(5,15,35,0.9)’;ctx.fillRect(0,0,W,H);
var zones=[
{x1:-490,x2:500,z1:-800,z2:300,c:‘rgba(100,200,80,0.25)’},
{x1:-490,x2:500,z1:-1700,z2:-800,c:‘rgba(20,10,60,0.35)’},
{x1:-490,x2:500,z1:-2400,z2:-1700,c:‘rgba(180,220,255,0.2)’},
{x1:-490,x2:500,z1:-2720,z2:-2400,c:‘rgba(255,140,50,0.2)’},
{x1:-490,x2:500,z1:-3700,z2:-2720,c:‘rgba(5,20,60,0.4)’},
];
zones.forEach(function(z){
ctx.fillStyle=z.c;
ctx.fillRect(wx(z.x1),wz(z.z1),wx(z.x2)-wx(z.x1),wz(z.z2)-wz(z.z1));
});
ctx.fillStyle=’#ffee44’;
STARS.forEach(function(s){if(!s.userData.alive)return;
var sx=wx(s.position.x),sz=wz(s.position.z);
ctx.beginPath();ctx.arc(sx,sz,2.5,0,Math.PI*2);ctx.fill();
});
if(window._UW&&window._UW.COINS){
ctx.fillStyle=’#44ffcc’;
window._UW.COINS.forEach(function(c){if(!c.userData.alive)return;
ctx.beginPath();ctx.arc(wx(c.position.x),wz(c.position.z),2,0,Math.PI*2);ctx.fill();
});
}
ctx.fillStyle=’#ffaa44’;
OCEAN_COINS.forEach(function(c){if(!c.userData.alive)return;
ctx.beginPath();ctx.arc(wx(c.position.x),wz(c.position.z),2,0,Math.PI*2);ctx.fill();
});
if(Math.abs(t*1.5%2-1)<0.5){
ctx.fillStyle=’#ff3300’;
ctx.beginPath();ctx.arc(wx(410),wz(TWALLZ),4,0,Math.PI*2);ctx.fill();
}
var kx=wx(P.inSub?SB.x:P.x),kz=wz(P.inSub?SB.z:P.z);
ctx.shadowColor=’#ff88cc’;ctx.shadowBlur=6;
ctx.fillStyle=’#ff55aa’;
ctx.beginPath();ctx.arc(kx,kz,5,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=’#fff’;ctx.lineWidth=1.5;ctx.stroke();
ctx.shadowBlur=0;
var yaw=P.inSub?SB.yaw:P.yaw;
ctx.strokeStyle=’#fff’;ctx.lineWidth=1.5;
ctx.beginPath();ctx.moveTo(kx,kz);ctx.lineTo(kx-Math.sin(yaw)*9,kz-Math.cos(yaw)*9);ctx.stroke();
})();

if(scene.fog){
var tNear=P.inSub?60:90;var tFar=P.inSub?620:(window._IN_FIRE_WORLD?500:(OCEAN_MODE?3000:(P.underwater?700:1100)));
scene.fog.near+=(tNear-scene.fog.near)*.08;scene.fog.far+=(tFar-scene.fog.far)*.08;
}
if(popTimer>0){popTimer-=dt;if(popTimer<=0)popupEl.className=’’;}
if(zoneAnnTimer>0){zoneAnnTimer-=dt;if(zoneAnnTimer<=0)zoneAnnEl.className=’’;}
if(!_glLost){try{renderer.render(scene,camera);}catch(e){console.warn(‘render err’,e.message);}}
}
animate();
})();
</script>
